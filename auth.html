<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TradeArena — Enter the Arena</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background:#060e1c; color:#f2e8cc; font-family:Arial,sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    .card { background:#091528; padding:40px; border:1px solid rgba(201,160,48,0.2); width:320px; text-align:center; border-radius:8px; }
    input { width:100%; padding:12px; margin:12px 0; background:#0d1e3a; border:1px solid rgba(201,160,48,0.2); color:#fff; border-radius:4px; }
    button { width:100%; padding:12px; background:#c9a030; border:none; color:#060e1c; font-weight:600; cursor:pointer; border-radius:4px; }
    .error { color:#f87171; margin-top:8px; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(0,0,0,0.2); border-top-color:#060e1c; border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <h2>Enter the Arena</h2>

  <div id="redirectPanel" style="display:none;">
    <p>You're already signed in. Redirecting to the Arena...</p>
  </div>

  <div id="formPanel">
    <input type="email" id="emailInput" placeholder="you@student.edu.au"/>
    <div id="emailError" class="error" style="display:none;"></div>
    <button id="submitBtn" onclick="handleLogin()">Send Magic Link</button>
  </div>

  <div id="successPanel" style="display:none;">
    <p>✅ Magic link sent to:</p>
    <strong id="sentEmail"></strong>
    <p style="margin-top:20px; font-size:14px;">Check your inbox (and spam folder)</p>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://chncykagtzotdtflkhim.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_C-IOFz5ZvT_-yJ4aGvZ1YA_zlSVCY9z';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const emailInput = document.getElementById('emailInput');
  const emailError = document.getElementById('emailError');
  const submitBtn = document.getElementById('submitBtn');

  function isValidStudentEmail(email) {
    return /^[^\s@]+@[^\s@]+\.edu\.au$/.test(email);
  }

  async function handleLogin() {
    const email = emailInput.value.trim();

    if (!isValidStudentEmail(email)) {
      emailError.textContent = 'Please use your student .edu.au email';
      emailError.style.display = 'block';
      return;
    }

    emailError.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Sending...';

    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + '/trade.html' }
    });

    if (error) {
      console.error(error);
      submitBtn.disabled = false;
      submitBtn.innerText = 'Send Magic Link';
      return;
    }

    document.getElementById('formPanel').style.display = 'none';
    document.getElementById('successPanel').style.display = 'block';
    document.getElementById('sentEmail').textContent = email;
  }

  // Auto-check if already logged in
  document.addEventListener('DOMContentLoaded', async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      document.getElementById('formPanel').style.display = 'none';
      document.getElementById('redirectPanel').style.display = 'block';
      setTimeout(() => window.location.href = 'trade.html', 1200);
    }
  });
</script>
</body>
</html>
