<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TradeArena · Your Profile</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&amp;family=Cinzel+Decorative:wght@700&amp;family=DM+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/styles.css"/>
  <style>
    .pf-shell{max-width:1040px;margin:0 auto;padding:32px 24px 60px;flex:1;width:100%;}

    /* ---- Header (Instagram-style) ---- */
    .pf-head{display:grid;grid-template-columns:auto 1fr;gap:48px;padding-bottom:32px;border-bottom:1px solid var(--bdl);}
    .pf-avatar-ring{
      width:160px;height:160px;border-radius:50%;
      padding:4px;
      background:linear-gradient(135deg,var(--gold),var(--gold2),#f87171,var(--blue));
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
    }
    .pf-avatar-inner{
      width:100%;height:100%;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-family:'Cinzel',serif;font-weight:700;
      font-size:3.4rem;letter-spacing:.03em;
      border:3px solid var(--navy);
      text-shadow:0 2px 8px rgba(0,0,0,.4);
    }
    .pf-meta{display:flex;flex-direction:column;gap:18px;min-width:0;}
    .pf-row1{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
    .pf-handle{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:600;letter-spacing:.04em;color:var(--cream);}
    .pf-actions{display:flex;gap:8px;flex-wrap:wrap;}
    .pf-actbtn{
      padding:8px 16px;border-radius:9px;border:1px solid var(--border);
      background:var(--navy3);color:var(--cream);font-size:13px;font-weight:600;
      cursor:pointer;display:inline-flex;align-items:center;gap:8px;
      transition:all .2s;font-family:'DM Sans',sans-serif;
    }
    .pf-actbtn:hover{border-color:var(--gold);color:var(--gold2);}
    .pf-actbtn.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);border:none;font-weight:700;}
    .pf-actbtn.primary:hover{filter:brightness(1.08);color:var(--navy);}
    .pf-stats{display:flex;gap:42px;flex-wrap:wrap;}
    .pf-stat{font-size:14px;color:var(--muted);}
    .pf-stat strong{color:var(--cream);font-weight:600;font-family:'Cinzel',serif;letter-spacing:.02em;font-size:18px;display:inline-block;margin-right:4px;}
    .pf-stat.green strong{color:var(--green);}
    .pf-name{font-family:'DM Sans',sans-serif;font-size:1.05rem;font-weight:600;color:var(--cream);}
    .pf-bio{font-size:14px;color:var(--cream);line-height:1.6;max-width:520px;}
    .pf-bio .uni{display:inline-flex;align-items:center;gap:6px;color:var(--gold2);font-weight:500;}
    .pf-bio .joined{display:block;color:var(--muted);font-size:12.5px;margin-top:6px;}
    .pf-tier{display:inline-flex;align-items:center;gap:8px;background:rgba(201,160,48,.12);color:var(--gold2);padding:5px 14px;border-radius:9999px;font-size:12px;font-weight:600;letter-spacing:.04em;}

    /* ---- Highlights (story circles) ---- */
    .pf-highlights{display:flex;gap:28px;padding:30px 0;border-bottom:1px solid var(--bdl);overflow-x:auto;}
    .pf-hl{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;flex-shrink:0;width:78px;}
    .pf-hl-circle{
      width:74px;height:74px;border-radius:50%;
      padding:3px;
      background:linear-gradient(135deg,var(--gold),#a16207);
      transition:transform .2s;
    }
    .pf-hl:hover .pf-hl-circle{transform:scale(1.04);}
    .pf-hl-inner{
      width:100%;height:100%;border-radius:50%;
      background:var(--navy3);border:2px solid var(--navy);
      display:flex;align-items:center;justify-content:center;
      font-size:24px;color:var(--gold2);
    }
    .pf-hl-label{font-size:11.5px;color:var(--cream);font-family:'Cinzel',serif;letter-spacing:.04em;text-align:center;line-height:1.3;}

    /* ---- Tabs ---- */
    .pf-tabs{display:flex;gap:0;border-bottom:1px solid var(--bdl);justify-content:center;margin-bottom:18px;}
    .pf-tab{
      padding:16px 30px;cursor:pointer;
      font-family:'Cinzel',serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
      color:var(--muted);background:transparent;border:none;border-top:1px solid transparent;
      transition:all .2s;display:inline-flex;align-items:center;gap:8px;
    }
    .pf-tab:hover{color:var(--cream);}
    .pf-tab.active{color:var(--gold2);border-top-color:var(--gold);background:linear-gradient(180deg,rgba(201,160,48,.06),transparent);}
    .pf-tab i{font-size:13px;}

    /* ---- Grid (Instagram-style 3 cols) ---- */
    .pf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
    @media(max-width:780px){.pf-grid{grid-template-columns:repeat(2,1fr);}}

    .gcard{
      background:var(--navy3);border:1px solid var(--bdl);
      border-radius:8px;overflow:hidden;cursor:pointer;
      aspect-ratio:1/1;display:flex;flex-direction:column;justify-content:space-between;
      padding:18px 16px;position:relative;
      transition:transform .2s, border-color .2s;
    }
    .gcard:hover{transform:translateY(-3px);border-color:var(--gold);}
    .gcard .gtop{display:flex;justify-content:space-between;align-items:flex-start;}
    .gcard .gsym{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;letter-spacing:.04em;color:var(--cream);}
    .gcard .gname{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.3;}
    .gcard .gbadge{font-size:10px;padding:3px 8px;border-radius:9999px;font-weight:600;background:rgba(201,160,48,.12);color:var(--gold2);}
    .gcard .gbadge.asx{background:rgba(16,185,129,.15);color:var(--green);}
    .gcard .gbadge.us{background:rgba(96,165,250,.15);color:var(--blue);}
    .gcard .gbadge.crypto{background:rgba(245,158,11,.15);color:#fbbf24;}
    .gcard .gspark{flex:1;margin:14px 0 10px;position:relative;}
    .gcard .gspark svg{width:100%;height:100%;display:block;}
    .gcard .gbottom{display:flex;justify-content:space-between;align-items:flex-end;}
    .gcard .gprice{font-family:'Cinzel',serif;font-size:1.15rem;font-weight:600;color:var(--cream);letter-spacing:.02em;}
    .gcard .gchg{font-size:12.5px;font-weight:600;font-family:'Cinzel',serif;letter-spacing:.04em;}

    .activity-list .arow{
      display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--bdl);
    }
    .activity-list .arow:last-child{border-bottom:none;}
    .arow .aicon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
    .arow .aicon.buy{background:rgba(74,222,128,.13);color:var(--green);}
    .arow .aicon.sell{background:rgba(248,113,113,.13);color:var(--red);}
    .arow .atxt{flex:1;}
    .arow .atxt strong{display:block;color:var(--cream);font-weight:600;}
    .arow .atxt small{color:var(--muted);font-size:12px;}
    .arow .aval{text-align:right;font-family:'Cinzel',serif;font-weight:600;}

    .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
    .empty-state i{font-size:42px;color:var(--gold);opacity:.4;margin-bottom:18px;display:block;}

    /* Edit modal */
    .modal-row{margin-bottom:14px;}
    .modal-row label{display:block;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .modal-row input, .modal-row textarea{
      width:100%;padding:12px 14px;background:var(--navy3);
      border:1px solid var(--border);color:var(--cream);
      font-family:'DM Sans',sans-serif;font-size:14px;
      border-radius:8px;outline:none;resize:vertical;
    }
    .modal-row input:focus, .modal-row textarea:focus{border-color:var(--gold);}

    @media(max-width:780px){
      .pf-head{grid-template-columns:auto;gap:24px;text-align:center;}
      .pf-avatar-ring{width:110px;height:110px;margin:0 auto;}
      .pf-avatar-inner{font-size:2.4rem;}
      .pf-row1{justify-content:center;}
      .pf-stats{justify-content:center;}
    }
  </style>
</head>
<body>

<div id="tarena-nav"></div>

<div class="pf-shell">

  <!-- Header -->
  <div class="pf-head">
    <div class="pf-avatar-ring">
      <div class="pf-avatar-inner" id="avatarInner">??</div>
    </div>
    <div class="pf-meta">
      <div class="pf-row1">
        <div class="pf-handle" id="handle">@username</div>
        <div class="pf-actions">
          <button class="pf-actbtn primary" onclick="openEdit()"><i class="fa-solid fa-pen"></i> Edit profile</button>
          <button class="pf-actbtn" onclick="shareProfile()"><i class="fa-solid fa-share"></i> Share</button>
          <button class="pf-actbtn" onclick="window.location.href='trade.html'"><i class="fa-solid fa-bolt"></i> Trade</button>
          <button class="pf-actbtn" onclick="signOut()" title="Sign out" style="color:#fca5a5;"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </div>
      </div>
      <div class="pf-stats">
        <div class="pf-stat green"><strong id="statValue">$0</strong> portfolio</div>
        <div class="pf-stat"><strong id="statHold">0</strong> holdings</div>
        <div class="pf-stat"><strong id="statTrades">0</strong> trades</div>
        <div class="pf-stat"><strong id="statWatch">0</strong> watching</div>
      </div>
      <div>
        <div class="pf-name" id="displayName">—</div>
        <div class="pf-bio" id="bio">—</div>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <span class="pf-tier"><i class="fa-solid fa-shield-halved"></i> <span id="tier">Member</span></span>
          <span class="badge"><span class="live-dot"></span> ASX OPEN</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Highlights -->
  <div class="pf-highlights">
    <div class="pf-hl" onclick="filterByMarket('all'); switchTab('holdings');">
      <div class="pf-hl-circle"><div class="pf-hl-inner">📊</div></div>
      <div class="pf-hl-label">All Assets</div>
    </div>
    <div class="pf-hl" onclick="filterByMarket('asx'); switchTab('holdings');">
      <div class="pf-hl-circle"><div class="pf-hl-inner">🇦🇺</div></div>
      <div class="pf-hl-label">ASX</div>
    </div>
    <div class="pf-hl" onclick="filterByMarket('us'); switchTab('holdings');">
      <div class="pf-hl-circle"><div class="pf-hl-inner">🇺🇸</div></div>
      <div class="pf-hl-label">US Stocks</div>
    </div>
    <div class="pf-hl" onclick="filterByMarket('crypto'); switchTab('holdings');">
      <div class="pf-hl-circle"><div class="pf-hl-inner">₿</div></div>
      <div class="pf-hl-label">Crypto</div>
    </div>
    <div class="pf-hl" onclick="window.location.href='portfolio.html';">
      <div class="pf-hl-circle"><div class="pf-hl-inner">🏆</div></div>
      <div class="pf-hl-label">Top Picks</div>
    </div>
    <div class="pf-hl" onclick="switchTab('activity')">
      <div class="pf-hl-circle"><div class="pf-hl-inner">⚡</div></div>
      <div class="pf-hl-label">Recent</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="pf-tabs">
    <button class="pf-tab active" data-tab="holdings" onclick="switchTab('holdings')"><i class="fa-solid fa-grip"></i> Holdings</button>
    <button class="pf-tab" data-tab="watchlist" onclick="switchTab('watchlist')"><i class="fa-solid fa-bookmark"></i> Watchlist</button>
    <button class="pf-tab" data-tab="activity" onclick="switchTab('activity')"><i class="fa-solid fa-clock"></i> Activity</button>
  </div>

  <!-- Tab content -->
  <div id="tabContent"></div>

</div>

<!-- Edit Profile Modal -->
<div class="modal-backdrop" id="editModal" onclick="if(event.target.id==='editModal') closeEdit()">
  <div class="modal">
    <h3>Edit Profile</h3>
    <div class="modal-row">
      <label>Display Name</label>
      <input type="text" id="editName" maxlength="40" placeholder="e.g. Alex Chen"/>
    </div>
    <div class="modal-row">
      <label>Bio</label>
      <textarea id="editBio" rows="3" maxlength="160" placeholder="Trader at UNSW · ASX + crypto"></textarea>
    </div>
    <div class="modal-row">
      <label>Tier</label>
      <input type="text" id="editTier" maxlength="30" placeholder="Member"/>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn-ghost full" onclick="closeEdit()">Cancel</button>
      <button class="btn-gold full" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div id="tarena-footer"></div>

<script src="assets/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="assets/supabase.js"></script>
<script src="assets/app.js"></script>
<script src="assets/market.js"></script>
<script>
  const session = TArenaAuth.requireAuth();
  if (!session) throw new Error('redirect');
  TArenaUI.renderNav('profile');
  TArenaUI.renderFooter();
  TArenaAuth.onAuthChange(s => { if (s) renderHeader(); });

  let activeTab = 'holdings';
  let marketFilter = 'all';

  function renderHeader() {
    const fresh = TArenaAuth.getSession();
    const u = (fresh && fresh.user) || session.user;
    const av = TArenaUI.getAvatar(u);
    const inner = document.getElementById('avatarInner');
    inner.textContent = av.initials;
    inner.style.background = av.gradient;
    document.getElementById('handle').textContent = u.handle;
    document.getElementById('displayName').textContent = u.displayName;
    const uniLabel = u.university === 'Public' ? '🌐 Public access' : `🎓 ${u.university}`;
    document.getElementById('bio').innerHTML = `${u.bio || '—'}
      <span class="joined">${uniLabel} · Joined ${new Date(u.joinedAt).toLocaleDateString('en-AU',{month:'short',year:'numeric'})}</span>`;
    document.getElementById('tier').textContent = u.tier;

    // Stats
    document.getElementById('statValue').textContent = TArenaUI.fmtMoney(TArenaMarket.totalValue(), {decimals:0});
    document.getElementById('statHold').textContent = TArenaMarket.holdings.length;
    document.getElementById('statTrades').textContent = TArenaMarket.getOrders().length;
    document.getElementById('statWatch').textContent = TArenaMarket.getWatchlist().length;
  }

  function sparkline(seed, up) {
    let pts = [];
    let v = 50;
    for (let i = 0; i < 24; i++) {
      v += (Math.sin(seed + i * 0.6) * 3) + (Math.random() - 0.4 + (up ? 0.3 : -0.3)) * 4;
      v = Math.max(10, Math.min(90, v));
      pts.push(`${(i / 23) * 100},${100 - v}`);
    }
    const color = up ? '#4ade80' : '#f87171';
    const fill = up ? 'rgba(74,222,128,.12)' : 'rgba(248,113,113,.12)';
    return `<svg viewBox="0 0 100 100" preserveAspectRatio="none">
      <polyline fill="${fill}" stroke="none" points="0,100 ${pts.join(' ')} 100,100"/>
      <polyline fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" points="${pts.join(' ')}"/>
    </svg>`;
  }

  function renderHoldings() {
    let list = TArenaMarket.holdings;
    if (marketFilter !== 'all') list = list.filter(h => h.type === marketFilter);
    if (!list.length) {
      return `<div class="empty-state"><i class="fa-solid fa-folder-open"></i><div>No holdings in this market.</div>
        <button class="btn-gold" style="margin-top:18px;" onclick="window.location.href='trade.html'">Start trading</button></div>`;
    }
    return `<div class="pf-grid">${list.map((h, i) => {
      const v = TArenaMarket.holdingValue(h);
      const m = TArenaMarket.find(h.symbol);
      const up = v.pnl >= 0;
      const sign = up ? '+' : '';
      return `<div class="gcard" onclick="window.location.href='trade.html'">
        <div class="gtop">
          <div>
            <div class="gsym">${h.symbol}</div>
            <div class="gname">${v.name}</div>
          </div>
          <div class="gbadge ${h.type}">${h.type.toUpperCase()}</div>
        </div>
        <div class="gspark">${sparkline(i, up)}</div>
        <div class="gbottom">
          <div>
            <div class="gprice">${TArenaUI.fmtMoney(v.value, {decimals:0})}</div>
            <div class="text-muted" style="font-size:11px;">${h.qty.toLocaleString('en-US',{maximumFractionDigits:4})} ${h.type==='crypto'?'':'shares'}</div>
          </div>
          <div class="gchg ${up ? 'text-green' : 'text-red'}">${sign}${v.pnlPct.toFixed(2)}%</div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  function renderWatchlist() {
    let list = TArenaMarket.getWatchlist().map(s => TArenaMarket.find(s)).filter(Boolean);
    if (marketFilter !== 'all') list = list.filter(m => m.market === marketFilter);
    if (!list.length) {
      return `<div class="empty-state"><i class="fa-solid fa-bookmark"></i><div>Your watchlist is empty.</div>
        <button class="btn-gold" style="margin-top:18px;" onclick="window.location.href='trade.html'">Add symbols</button></div>`;
    }
    return `<div class="pf-grid">${list.map((m, i) => {
      const up = m.change >= 0;
      const sign = up ? '+' : '';
      return `<div class="gcard" onclick="window.location.href='trade.html'">
        <div class="gtop">
          <div>
            <div class="gsym">${m.symbol}</div>
            <div class="gname">${m.name}</div>
          </div>
          <div class="gbadge ${m.market}">${m.market.toUpperCase()}</div>
        </div>
        <div class="gspark">${sparkline(i + 7, up)}</div>
        <div class="gbottom">
          <div>
            <div class="gprice">$${m.price < 100 ? m.price.toFixed(2) : m.price.toLocaleString()}</div>
            <div class="text-muted" style="font-size:11px;">${m.mcap}</div>
          </div>
          <div class="gchg ${up ? 'text-green' : 'text-red'}">${sign}${m.change.toFixed(2)}%</div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  function renderActivity() {
    const orders = TArenaMarket.getOrders();
    if (!orders.length) {
      return `<div class="empty-state"><i class="fa-solid fa-clock"></i><div>No trades yet.</div>
        <button class="btn-gold" style="margin-top:18px;" onclick="window.location.href='trade.html'">Place your first trade</button></div>`;
    }
    return `<div class="card-flat" style="padding:0;">
      <div class="activity-list">${orders.map(o => `
        <div class="arow">
          <div class="aicon ${o.side}"><i class="fa-solid fa-${o.side==='buy'?'arrow-up':'arrow-down'}"></i></div>
          <div class="atxt">
            <strong>${o.side === 'buy' ? 'Bought' : 'Sold'} ${o.symbol}</strong>
            <small>${o.shares.toFixed(4)} @ $${o.price.toLocaleString()} · ${new Date(o.ts).toLocaleString('en-AU')}</small>
          </div>
          <div class="aval">${TArenaUI.fmtMoney(o.amount, {decimals:2})}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  function switchTab(name) {
    activeTab = name;
    document.querySelectorAll('.pf-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    const c = document.getElementById('tabContent');
    if (name === 'holdings')       c.innerHTML = renderHoldings();
    else if (name === 'watchlist') c.innerHTML = renderWatchlist();
    else                           c.innerHTML = renderActivity();
  }
  function filterByMarket(m) { marketFilter = m; }

  function openEdit() {
    const u = (TArenaAuth.getSession() || {user: session.user}).user;
    document.getElementById('editName').value = u.displayName || '';
    document.getElementById('editBio').value  = u.bio || '';
    document.getElementById('editTier').value = u.tier || 'Member';
    document.getElementById('editModal').classList.add('show');
  }
  function closeEdit() { document.getElementById('editModal').classList.remove('show'); }
  async function saveEdit() {
    const r = await TArenaAuth.saveProfile({
      displayName: document.getElementById('editName').value.trim() || session.user.handle,
      bio:         document.getElementById('editBio').value.trim()  || '',
      tier:        document.getElementById('editTier').value.trim() || 'Member',
    });
    if (!r.ok) { alert('Could not save: ' + r.error); return; }
    closeEdit();
    renderHeader();
  }
  function shareProfile() {
    const url = window.location.origin + '/profile.html?u=' + encodeURIComponent(session.user.handle);
    if (navigator.clipboard) navigator.clipboard.writeText(url);
    alert('Profile link copied!\n\n' + url);
  }
  async function signOut() {
    if (!confirm('Sign out of TradeArena?')) return;
    await TArenaAuth.signOut();
    window.location.href = 'index.html';
  }

  window.switchTab = switchTab;
  window.filterByMarket = filterByMarket;
  window.openEdit = openEdit;
  window.closeEdit = closeEdit;
  window.saveEdit = saveEdit;
  window.shareProfile = shareProfile;
  window.signOut = signOut;

  // Init
  renderHeader();
  switchTab('holdings');
  setInterval(() => {
    TArenaMarket.tick();
    renderHeader();
    if (activeTab !== 'activity') {
      // Re-render only the changing pieces (price-driven tabs)
      const c = document.getElementById('tabContent');
      c.innerHTML = activeTab === 'holdings' ? renderHoldings() : renderWatchlist();
    }
  }, 5000);

  console.log('%c⚔️ TradeArena · Profile loaded for ' + session.user.email, 'color:#e8c060;font-weight:700;');
</script>
</body>
</html>
