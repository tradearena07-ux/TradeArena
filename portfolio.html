<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#c9a030"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="TradeArena"/>
  <link rel="apple-touch-icon" href="/assets/icon-192.png"/>
<title>TradeArena · Portfolio</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .pg{max-width:1100px;margin:0 auto;padding:24px;flex:1;width:100%;}

    /* ----- Hero / Investments header ----- */
    .pf-hero{background:linear-gradient(135deg, var(--navy2) 0%, var(--navy3) 100%);border:1px solid var(--border);border-radius:18px;padding:28px 30px;margin-bottom:18px;}
    .pf-hero-row{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:flex-end;}
    .pf-hero-left{display:flex;flex-direction:column;gap:6px;}
    .pf-hero-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-weight:600;}
    .pf-hero-value{font-family:'DM Sans',sans-serif;font-size:2.6rem;font-weight:700;color:var(--cream);font-feature-settings:'tnum';line-height:1;}
    .pf-hero-returns{display:flex;align-items:baseline;gap:10px;margin-top:8px;}
    .pf-hero-returns .amt{font-family:'DM Sans',sans-serif;font-size:1.05rem;font-weight:600;font-feature-settings:'tnum';}
    .pf-hero-returns .pct{font-size:13px;font-weight:500;}
    .pf-hero-returns .lbl{font-size:13px;color:var(--muted);margin-left:6px;}
    .pf-hero-right{text-align:right;}
    .pf-today{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);border-radius:12px;padding:10px 16px;display:inline-flex;flex-direction:column;align-items:flex-end;}
    .pf-today.down{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.25);}
    .pf-today .lbl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:600;}
    .pf-today .val{font-family:'DM Sans',sans-serif;font-size:1.15rem;font-weight:700;font-feature-settings:'tnum';margin-top:2px;}

    /* ----- Time range tabs ----- */
    .tr-tabs{display:flex;gap:4px;background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content;margin:18px 0 14px;}
    .tr-tab{padding:7px 16px;background:transparent;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border-radius:7px;letter-spacing:.04em;transition:all .15s;}
    .tr-tab:hover{color:var(--cream);}
    .tr-tab.on{background:var(--gold2);color:var(--navy);}

    /* ----- Chart container ----- */
    .pf-chart-card{background:var(--navy2);border:1px solid var(--border);border-radius:16px;padding:18px 20px 14px;height:280px;position:relative;}

    /* ----- Allocation bar (Groww-style segmented) ----- */
    .alloc-card{background:var(--navy2);border:1px solid var(--border);border-radius:16px;padding:20px;margin:14px 0;}
    .alloc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .alloc-head h3{font-family:'DM Sans',sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:700;}
    .alloc-bar{display:flex;height:10px;border-radius:9999px;overflow:hidden;background:var(--navy3);margin-bottom:14px;}
    .alloc-seg{height:100%;transition:width .4s;}
    .alloc-seg.asx{background:linear-gradient(90deg,#10b981,#34d399);}
    .alloc-seg.us{background:linear-gradient(90deg,#3b82f6,#60a5fa);}
    .alloc-seg.crypto{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
    .alloc-seg.cash{background:linear-gradient(90deg,#a16207,#c9a030);}
    .alloc-legend{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;}
    .alloc-leg{display:flex;align-items:center;gap:10px;}
    .alloc-leg .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
    .alloc-leg .l1{font-size:12px;color:var(--muted);}
    .alloc-leg .l2{font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;color:var(--cream);font-feature-settings:'tnum';}

    /* ----- Holdings list ----- */
    .holdings-card{background:var(--navy2);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
    .holdings-head{padding:18px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--bdl);}
    .holdings-head h3{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:var(--cream);}
    .h-filter{display:flex;gap:6px;}
    .h-pill{padding:6px 14px;background:var(--navy3);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;border-radius:9999px;cursor:pointer;transition:all .15s;}
    .h-pill:hover{color:var(--cream);}
    .h-pill.on{background:rgba(201,160,48,.12);border-color:var(--gold);color:var(--gold2);}

    .h-row{display:grid;grid-template-columns:42px 1fr auto auto;gap:14px;align-items:center;padding:16px 22px;border-bottom:1px solid var(--bdl);cursor:pointer;transition:background .15s;}
    .h-row:hover{background:rgba(201,160,48,.04);}
    .h-row:last-child{border-bottom:none;}
    .h-row .icn{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:700;font-size:11px;color:#fff;letter-spacing:.04em;}
    .h-row .icn.asx{background:linear-gradient(135deg,#065f46,#10b981);}
    .h-row .icn.us{background:linear-gradient(135deg,#1e40af,#3b82f6);}
    .h-row .icn.crypto{background:linear-gradient(135deg,#92400e,#f59e0b);}
    .h-row .meta .sym{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:var(--cream);}
    .h-row .meta .name{font-size:12px;color:var(--muted);margin-top:2px;}
    .h-row .qty{text-align:right;font-size:12.5px;color:var(--muted);font-feature-settings:'tnum';}
    .h-row .qty b{display:block;color:var(--cream);font-weight:600;font-size:13px;margin-bottom:2px;}
    .h-row .pnl{text-align:right;font-feature-settings:'tnum';min-width:100px;}
    .h-row .pnl .v{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:var(--cream);}
    .h-row .pnl .p{font-size:12.5px;font-weight:600;margin-top:2px;}

    /* ----- Movers cards ----- */
    .movers{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0;}
    @media(max-width:780px){.movers{grid-template-columns:1fr;}.pf-hero-row{grid-template-columns:1fr;}.pf-hero-right{text-align:left;}}
    .mover-card{background:var(--navy2);border:1px solid var(--border);border-radius:14px;padding:18px;}
    .mover-card h4{font-family:'DM Sans',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:700;margin-bottom:14px;}
    .mover-line{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdl);}
    .mover-line:last-child{border-bottom:none;}
    .mover-line .sym{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--cream);}
    .mover-line .px{text-align:right;font-feature-settings:'tnum';}
    .mover-line .px .a{font-size:13px;font-weight:600;color:var(--cream);}
    .mover-line .px .b{font-size:11.5px;font-weight:600;}

    .empty-row{padding:40px;text-align:center;color:var(--muted);}

    /* ----- Close position modal ----- */
    .modal-overlay{position:fixed;inset:0;background:rgba(6,14,28,.85);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.hidden{display:none;}
    .modal-box{background:var(--navy2);border:1px solid var(--border);border-radius:20px;padding:28px;max-width:420px;width:100%;}
    .modal-box h3{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;color:var(--cream);margin:0 0 6px;}
    .modal-box .sub{font-size:13px;color:var(--muted);margin-bottom:22px;}
    .modal-field{margin-bottom:16px;}
    .modal-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
    .modal-field input{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;box-sizing:border-box;}
    .modal-field input:focus{outline:none;border-color:var(--gold);}
    .modal-pnl{background:var(--navy3);border:1px solid var(--bdl);border-radius:12px;padding:14px 16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
    .modal-pnl .lbl{font-size:12px;color:var(--muted);}
    .modal-pnl .val{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;}
    .modal-actions{display:flex;gap:10px;}
    .modal-actions button{flex:1;padding:13px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
    .btn-cancel{background:var(--navy3);color:var(--muted);border:1px solid var(--border)!important;}
    .btn-cancel:hover{color:var(--cream);}
    .btn-close-pos{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;}
    .btn-close-pos:hover{opacity:.88;}

    /* ----- Trade history tab ----- */
    .pf-tabs{display:flex;gap:6px;margin-bottom:18px;}
    .pf-tab{padding:8px 20px;background:var(--navy3);border:1px solid var(--border);color:var(--muted);font-size:13px;font-weight:600;border-radius:9999px;cursor:pointer;transition:all .15s;}
    .pf-tab:hover{color:var(--cream);}
    .pf-tab.on{background:rgba(201,160,48,.12);border-color:var(--gold);color:var(--gold2);}
    .history-card{background:var(--navy2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-top:18px;}
    .history-head{padding:16px 22px;border-bottom:1px solid var(--bdl);display:flex;justify-content:space-between;align-items:center;}
    .history-head h3{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:var(--cream);}
    .hist-row{display:grid;grid-template-columns:42px 1fr auto auto;gap:14px;align-items:center;padding:14px 22px;border-bottom:1px solid var(--bdl);}
    .hist-row:last-child{border-bottom:none;}
    .hist-row .icn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:700;font-size:10px;color:#fff;}
    .hist-row .icn.asx{background:linear-gradient(135deg,#065f46,#10b981);}
    .hist-row .icn.us{background:linear-gradient(135deg,#1e40af,#3b82f6);}
    .hist-row .icn.crypto{background:linear-gradient(135deg,#92400e,#f59e0b);}
    .hist-row .meta .sym{font-size:13px;font-weight:700;color:var(--cream);}
    .hist-row .meta .dt{font-size:11px;color:var(--muted);margin-top:2px;}
    .hist-row .prices{text-align:right;font-size:12px;color:var(--muted);font-feature-settings:'tnum';}
    .hist-row .prices b{display:block;color:var(--cream);font-size:13px;font-weight:600;margin-bottom:2px;}
    .hist-row .rpnl{text-align:right;font-feature-settings:'tnum';}
    .hist-row .rpnl .v{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;}
    .hist-row .rpnl .p{font-size:11.5px;font-weight:600;margin-top:2px;}

    /* ----- Close button on holdings row ----- */
    .h-row{display:grid;grid-template-columns:42px 1fr auto auto auto;gap:14px;align-items:center;padding:16px 22px;border-bottom:1px solid var(--bdl);transition:background .15s;}
    .h-row:hover{background:rgba(201,160,48,.04);}
    .h-row:last-child{border-bottom:none;}
    .btn-close-row{padding:7px 14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;white-space:nowrap;transition:all .15s;}
    .btn-close-row:hover{background:rgba(239,68,68,.2);border-color:#ef4444;}
  </style>
</head>
<body>

<div id="tarena-nav"></div>

<div class="pg">

  <!-- ============== HERO: TOTAL VALUE + RETURNS ============== -->
  <div class="pf-hero">
    <div class="pf-hero-row">
      <div class="pf-hero-left">
        <div class="pf-hero-label">Investments</div>
        <div class="pf-hero-value" id="totalValue">$0</div>
        <div class="pf-hero-returns">
          <span class="amt" id="totalRet">+$0</span>
          <span class="pct" id="totalRetPct">+0.00%</span>
          <span class="lbl">total returns</span>
        </div>
      </div>
      <div class="pf-hero-right">
        <div class="pf-today" id="todayBox">
          <div class="lbl">Today</div>
          <div class="val" id="todayVal">+$0 (+0.00%)</div>
        </div>
      </div>
    </div>

    <div class="tr-tabs" id="trTabs">
      <button class="tr-tab" data-r="1d">1D</button>
      <button class="tr-tab" data-r="1w">1W</button>
      <button class="tr-tab on" data-r="1m">1M</button>
      <button class="tr-tab" data-r="3m">3M</button>
      <button class="tr-tab" data-r="1y">1Y</button>
      <button class="tr-tab" data-r="all">ALL</button>
    </div>

    <div class="pf-chart-card">
      <canvas id="perfChart"></canvas>
    </div>
  </div>

  <!-- ============== ALLOCATION ============== -->
  <div class="alloc-card">
    <div class="alloc-head">
      <h3>Asset Allocation</h3>
      <a href="trade.html" style="font-size:12px;color:var(--gold2);font-weight:600;">View markets →</a>
    </div>
    <div class="alloc-bar" id="allocBar"></div>
    <div class="alloc-legend" id="allocLegend"></div>
  </div>

  <!-- ============== PAGE TABS ============== -->
  <div class="pf-tabs" id="pfTabs">
    <button class="pf-tab on" data-t="holdings">Holdings</button>
    <button class="pf-tab" data-t="history">Trade History</button>
  </div>

  <!-- ============== HOLDINGS LIST ============== -->
  <div id="holdingsSection">
  <div class="holdings-card">
    <div class="holdings-head">
      <h3>Your Holdings</h3>
      <div class="h-filter" id="hFilter">
        <button class="h-pill on" data-m="all">All</button>
        <button class="h-pill" data-m="asx">ASX</button>
        <button class="h-pill" data-m="us">US</button>
        <button class="h-pill" data-m="crypto">Crypto</button>
      </div>
    </div>
    <div id="holdingsList"></div>
  </div>
  </div>

  <!-- ============== TRADE HISTORY ============== -->
  <div id="historySection" style="display:none;">
    <div class="history-card">
      <div class="history-head">
        <h3>Closed Trades</h3>
        <span id="histCount" style="font-size:12px;color:var(--muted);"></span>
      </div>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- ============== CLOSE POSITION MODAL ============== -->
  <div class="modal-overlay hidden" id="closeModal">
    <div class="modal-box">
      <h3 id="closeModalTitle">Close Position</h3>
      <div class="sub" id="closeModalSub">Sell all shares at the current market price.</div>
      <div class="modal-field">
        <label>Exit Price (AUD)</label>
        <input type="number" id="closeExitPrice" step="0.01" min="0.01"/>
      </div>
      <div class="modal-pnl">
        <div class="lbl">Estimated P&amp;L</div>
        <div class="val" id="closePnlPreview">—</div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="hideCloseModal()">Cancel</button>
        <button class="btn-close-pos" id="closeConfirmBtn" onclick="confirmClose()">Close Position</button>
      </div>
    </div>
  </div>

  <!-- ============== TOP MOVERS ============== -->
  <div class="movers">
    <div class="mover-card">
      <h4><i class="fa-solid fa-arrow-trend-up text-green"></i> Top gainers</h4>
      <div id="gainersList"></div>
    </div>
    <div class="mover-card">
      <h4><i class="fa-solid fa-arrow-trend-down text-red"></i> Top losers</h4>
      <div id="losersList"></div>
    </div>
    <div class="mover-card">
      <h4><i class="fa-solid fa-fire text-gold"></i> Most active</h4>
      <div id="activeList"></div>
    </div>
  </div>

</div>

<div id="tarena-footer"></div>

<script src="assets/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="assets/supabase.js"></script>
<script src="assets/app.js"></script>
<script src="assets/market.js"></script>
<script src="assets/datafeed.js"></script>
<script>
  // ============================================================
  // PORTFOLIO — real Supabase-backed dashboard.
  // New users start with $25,000 cash and zero invested. Holdings
  // come from `get_my_holdings()` (RLS-gated). Live prices come
  // from TArenaDatafeed (Binance direct for crypto, data-proxy for
  // stocks). If a quote isn't available we fall back to avg_cost
  // so the dashboard still renders meaningful numbers.
  // ============================================================
  const session = TArenaAuth.requireAuth();
  if (!session) throw new Error('redirect');
  TArenaUI.renderNav('portfolio');
  TArenaUI.renderFooter();

  // The single source of truth for the starting paper-trading bankroll.
  // (The SQL `get_cash_balance_for` RPC still uses the legacy 100k
  // constant; this client-side compute supersedes it for the dashboard.)
  const STARTING_CAPITAL = 25000;

  let activeRange = '1m';
  let activeMarket = 'all';
  let perfChart;
  let portfolio = {
    holdings:        [],   // [{symbol, qty, avgCost, current, value, cost, pnl, pnlPct, todayPct, type, name}]
    cash:            STARTING_CAPITAL,
    investedCost:    0,
    investedValue:   0,
    totalValue:      STARTING_CAPITAL,
    totalReturn:     0,
    totalReturnPct:  0,
    todayChange:     0,
    todayPct:        0,
  };

  // Classify a raw symbol into asx/us/crypto for the allocation buckets
  // and the icon colour. Mirrors TArenaDatafeed.classify but without
  // requiring the datafeed to be loaded.
  function classifyType(symbol) {
    const s = String(symbol || '').toUpperCase();
    if (s.endsWith('.AX')) return 'asx';
    if (TArenaDatafeed && TArenaDatafeed.classify(s) === 'crypto') return 'crypto';
    return 'us';
  }

  function nameFor(symbol) {
    const m = TArenaMarket.find(symbol);
    return m ? m.name : symbol;
  }

  async function loadHoldings() {
    // get_my_holdings() returns the materialized rollup of paper_trades
    // for the signed-in user. Empty array → brand new account.
    const { data, error } = await TArenaDB.rpc('get_my_holdings');
    if (error) {
      console.warn('get_my_holdings failed:', error.message);
      return [];
    }
    // Also fetch the open trade IDs so we can close individual positions
    const { data: trades } = await TArenaDB
      .from('paper_trades')
      .select('id,symbol,side')
      .eq('status','open')
      .order('opened_at',{ascending:false});
    const tradeMap = {};
    (trades||[]).forEach(t => { if (!tradeMap[t.symbol]) tradeMap[t.symbol] = t; });
    return (data || [])
      .filter(r => Number(r.net_qty) > 0)
      .map(r => ({
        symbol:  r.symbol,
        qty:     Number(r.net_qty),
        avgCost: Number(r.avg_cost) || 0,
        type:    classifyType(r.symbol),
        name:    nameFor(r.symbol),
        tradeId: tradeMap[r.symbol]?.id || '',
        side:    tradeMap[r.symbol]?.side || 'buy',
      }));
  }

  async function loadQuotes(symbols) {
    if (!symbols.length) return {};
    try { return await TArenaDatafeed.fetchQuotes(symbols); }
    catch (e) { console.warn('fetchQuotes failed:', e.message); return {}; }
  }

  function recomputePortfolio(rawHoldings, quotes) {
    const enriched = rawHoldings.map(h => {
      const q = quotes[h.symbol];
      const current = (q && isFinite(q.price)) ? q.price : h.avgCost;
      const value   = h.qty * current;
      const cost    = h.qty * h.avgCost;
      const pnl     = value - cost;
      const pnlPct  = cost ? (pnl / cost) * 100 : 0;
      const todayPct = (q && isFinite(q.changePct)) ? q.changePct : 0;
      return Object.assign({}, h, { current, value, cost, pnl, pnlPct, todayPct });
    });
    const investedCost  = enriched.reduce((s, h) => s + h.cost,  0);
    const investedValue = enriched.reduce((s, h) => s + h.value, 0);
    const cash          = Math.max(0, STARTING_CAPITAL - investedCost);
    const totalValue    = investedValue + cash;
    const totalReturn   = totalValue - STARTING_CAPITAL;
    const totalReturnPct = (totalReturn / STARTING_CAPITAL) * 100;
    const todayChange   = enriched.reduce((s, h) => s + h.value * (h.todayPct / 100), 0);
    const todayPct      = totalValue ? (todayChange / totalValue) * 100 : 0;
    portfolio = { holdings: enriched, cash, investedCost, investedValue, totalValue, totalReturn, totalReturnPct, todayChange, todayPct };
  }

  function renderHero() {
    document.getElementById('totalValue').textContent  = TArenaUI.fmtMoney(portfolio.totalValue, {decimals:2});
    const ret = portfolio.totalReturn;
    document.getElementById('totalRet').textContent    = TArenaUI.fmtMoney(ret, {sign:true, decimals:2});
    document.getElementById('totalRet').className      = 'amt ' + (ret >= 0 ? 'text-green' : 'text-red');
    document.getElementById('totalRetPct').textContent = '(' + TArenaUI.fmtPct(portfolio.totalReturnPct) + ')';
    document.getElementById('totalRetPct').className   = 'pct ' + (ret >= 0 ? 'text-green' : 'text-red');

    const tBox = document.getElementById('todayBox');
    tBox.classList.toggle('down', portfolio.todayChange < 0);
    const cls = portfolio.todayChange >= 0 ? 'text-green' : 'text-red';
    document.getElementById('todayVal').innerHTML =
      `<span class="${cls}">${TArenaUI.fmtMoney(portfolio.todayChange, {sign:true,decimals:0})} (${TArenaUI.fmtPct(portfolio.todayPct)})</span>`;
  }

  function renderAllocation() {
    const groups = { asx: 0, us: 0, crypto: 0, cash: portfolio.cash };
    portfolio.holdings.forEach(h => { groups[h.type] = (groups[h.type] || 0) + h.value; });
    const total = Object.values(groups).reduce((a,b) => a+b, 0) || 1;
    const meta = [
      { k: 'asx',    label: 'ASX',     color: '#10b981' },
      { k: 'us',     label: 'US',      color: '#3b82f6' },
      { k: 'crypto', label: 'Crypto',  color: '#f59e0b' },
      { k: 'cash',   label: 'Cash',    color: '#c9a030' },
    ];
    document.getElementById('allocBar').innerHTML = meta.map(m => {
      const w = (groups[m.k] / total) * 100;
      return `<div class="alloc-seg ${m.k}" style="width:${w}%;" title="${m.label} ${w.toFixed(1)}%"></div>`;
    }).join('');
    document.getElementById('allocLegend').innerHTML = meta.map(m => {
      const w = (groups[m.k] / total) * 100;
      return `<div class="alloc-leg">
        <div class="dot" style="background:${m.color};"></div>
        <div>
          <div class="l1">${m.label} · ${w.toFixed(1)}%</div>
          <div class="l2">${TArenaUI.fmtMoney(groups[m.k], {decimals:0})}</div>
        </div>
      </div>`;
    }).join('');
  }

  function renderHoldings() {
    let list = portfolio.holdings.slice();
    if (activeMarket !== 'all') list = list.filter(h => h.type === activeMarket);
    if (!portfolio.holdings.length) {
      document.getElementById('holdingsList').innerHTML = `
        <div class="empty-row" style="padding:48px 24px;">
          <div style="font-size:36px;opacity:0.6;margin-bottom:10px;">📊</div>
          <div style="color:var(--cream);font-weight:600;font-size:15px;margin-bottom:6px;">No positions yet</div>
          <div style="font-size:13px;margin-bottom:20px;">Start with <strong style="color:var(--gold2);">${TArenaUI.fmtMoney(STARTING_CAPITAL,{decimals:0})}</strong> in paper cash. Place your first trade to see it here.</div>
          <a href="trade.html" class="btn-gold" style="display:inline-flex;text-decoration:none;">Go to Markets</a>
        </div>`;
      return;
    }
    if (!list.length) {
      document.getElementById('holdingsList').innerHTML = '<div class="empty-row">No holdings in this market.</div>';
      return;
    }
    document.getElementById('holdingsList').innerHTML = list.map(h => {
      const initials = h.symbol.replace('.AX', '').slice(0, 3);
      const up = h.pnl >= 0;
      const escSym = h.symbol.replace('.AX','').replace(/[<>&"']/g,'');
      const escName = h.name.replace(/[<>&"']/g, s => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[s]));
      return `<div class="h-row">
        <div class="icn ${h.type}" onclick="window.location.href='trade.html'" style="cursor:pointer;">${initials}</div>
        <div class="meta" onclick="window.location.href='trade.html'" style="cursor:pointer;">
          <div class="sym">${escSym}</div>
          <div class="name">${escName} · ${h.type.toUpperCase()}</div>
        </div>
        <div class="qty" onclick="window.location.href='trade.html'" style="cursor:pointer;">
          <b>${TArenaUI.fmtMoney(h.value, {decimals:0})}</b>
          ${h.qty.toLocaleString('en-US',{maximumFractionDigits:4})} × ${TArenaUI.fmtMoney(h.current, {decimals:2})}
        </div>
        <div class="pnl" onclick="window.location.href='trade.html'" style="cursor:pointer;">
          <div class="v ${up ? 'text-green' : 'text-red'}">${TArenaUI.fmtMoney(h.pnl, {sign:true, decimals:2})}</div>
          <div class="p ${up ? 'text-green' : 'text-red'}">${TArenaUI.fmtPct(h.pnlPct)} <span class="text-muted" style="font-weight:400;">· today ${TArenaUI.fmtPct(h.todayPct)}</span></div>
        </div>
        <button class="btn-close-row" data-trade-id="${(h.tradeId||'').replace(/[^a-zA-Z0-9\-]/g,'')}" data-symbol="${h.symbol.replace(/[^A-Z0-9\.]/g,'')}" data-qty="${h.qty}" data-avg-cost="${h.avgCost}" data-side="${h.side||'buy'}" data-type="${h.type}" data-current="${h.current||h.avgCost}" onclick="openCloseModalFromBtn(this)">Close</button>
      </div>`;
    }).join('');
  }

  // Movers come from the static catalogue — they're "what's hot in the
  // market overall today", not user-specific. Independent of holdings.
  function renderMovers() {
    const all = TArenaMarket.data.slice();
    const gainers = all.slice().sort((a,b) => b.change - a.change).slice(0, 4);
    const losers  = all.slice().sort((a,b) => a.change - b.change).slice(0, 4);
    const active  = all.slice().sort((a,b) => Math.abs(b.change) - Math.abs(a.change)).slice(0, 4);

    function rows(arr) {
      return arr.map(m => {
        const up = m.change >= 0;
        return `<div class="mover-line">
          <div>
            <div class="sym">${m.symbol.replace('.AX','')}</div>
            <div class="text-muted" style="font-size:11px;margin-top:2px;">${m.name}</div>
          </div>
          <div class="px">
            <div class="a">$${m.price < 100 ? m.price.toFixed(2) : m.price.toLocaleString()}</div>
            <div class="b ${up ? 'text-green' : 'text-red'}">${TArenaUI.fmtPct(m.change)}</div>
          </div>
        </div>`;
      }).join('');
    }
    document.getElementById('gainersList').innerHTML = rows(gainers);
    document.getElementById('losersList').innerHTML  = rows(losers);
    document.getElementById('activeList').innerHTML  = rows(active);
  }

  function genPerfData(range) {
    // Synthetic equity curve until we wire up account-snapshot history.
    // Anchors at STARTING_CAPITAL on the left, current portfolio value
    // on the right. For new users the line is essentially flat at $25k.
    const points = { '1d': 24, '1w': 30, '1m': 30, '3m': 60, '1y': 52, 'all': 80 }[range] || 30;
    const startVal = STARTING_CAPITAL;
    const endVal   = portfolio.totalValue;
    const span     = endVal - startVal;
    const flat     = Math.abs(span) < 1;
    const data = [];
    for (let i = 0; i <= points; i++) {
      const t = i / points;
      const noise = flat ? 0 : (Math.sin(i * 0.45) * Math.abs(span) * 0.02 + (Math.random() - 0.5) * Math.abs(span) * 0.015);
      data.push(startVal + span * t + noise * (range === '1d' ? 0.2 : 1));
    }
    return data;
  }

  function renderChart() {
    const data = genPerfData(activeRange);
    const labels = data.map((_, i) => i);
    const ctx = document.getElementById('perfChart').getContext('2d');
    if (perfChart) perfChart.destroy();
    perfChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data,
          borderColor: '#e8c060',
          backgroundColor: ctx => {
            const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 250);
            g.addColorStop(0, 'rgba(232,192,96,.25)');
            g.addColorStop(1, 'rgba(232,192,96,0)');
            return g;
          },
          fill: true,
          borderWidth: 2,
          tension: 0.35,
          pointRadius: 0,
          pointHoverRadius: 6,
          pointHoverBackgroundColor: '#e8c060',
          pointHoverBorderColor: '#091528',
          pointHoverBorderWidth: 2,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0c1d36',
            borderColor: 'rgba(201,160,48,.3)',
            borderWidth: 1,
            padding: 12,
            titleFont: { family: 'DM Sans', size: 11 },
            bodyFont: { family: 'DM Sans', size: 13, weight: '700' },
            displayColors: false,
            callbacks: { title: () => '', label: (ctx) => '$' + Math.round(ctx.parsed.y).toLocaleString() },
          },
        },
        scales: {
          x: { display: false, grid: { display: false } },
          y: {
            position: 'right',
            ticks: { color: 'rgba(168,193,219,.5)', font: { family: 'DM Sans', size: 10 }, callback: v => '$' + (v/1000).toFixed(1) + 'k' },
            grid: { color: 'rgba(255,255,255,.04)' },
            border: { display: false },
          },
        },
      },
    });
  }

  // ============================================================
  // CLOSE POSITION MODAL
  // ============================================================
  // openCloseModalFromBtn reads data attributes (XSS-safe)
  window.openCloseModalFromBtn = function(btn) {
    const h = {
      tradeId:  btn.dataset.tradeId  || '',
      symbol:   btn.dataset.symbol   || '',
      qty:      parseFloat(btn.dataset.qty)     || 0,
      avgCost:  parseFloat(btn.dataset.avgCost) || 0,
      side:     btn.dataset.side     || 'buy',
      type:     btn.dataset.type     || 'asx',
      current:  parseFloat(btn.dataset.current) || 0,
    };
    showCloseModal(h);
  };
  // Legacy alias kept for backward compat
  window.openCloseModal = window.openCloseModalFromBtn;

  let closeModalState = null; // { tradeId, symbol, qty, avgCost, side, type }

  function showCloseModal(h) {
    closeModalState = h;
    const sym = h.symbol.replace('.AX','');
    document.getElementById('closeModalTitle').textContent = 'Close ' + sym + ' Position';
    document.getElementById('closeModalSub').textContent =
      h.qty.toLocaleString('en-US',{maximumFractionDigits:4}) + ' shares · avg cost ' + TArenaUI.fmtMoney(h.avgCost,{decimals:2});
    const exitInput = document.getElementById('closeExitPrice');
    exitInput.value = h.current ? h.current.toFixed(2) : h.avgCost.toFixed(2);
    updatePnlPreview();
    document.getElementById('closeModal').classList.remove('hidden');
    exitInput.focus();
  }

  function hideCloseModal() {
    document.getElementById('closeModal').classList.add('hidden');
    closeModalState = null;
  }

  function updatePnlPreview() {
    if (!closeModalState) return;
    const exit = parseFloat(document.getElementById('closeExitPrice').value);
    if (!isFinite(exit) || exit <= 0) { document.getElementById('closePnlPreview').textContent = '—'; return; }
    const { qty, avgCost, side } = closeModalState;
    const pnl = side === 'sell'
      ? (avgCost - exit) * qty
      : (exit - avgCost) * qty;
    const pct = avgCost > 0 ? (pnl / (avgCost * qty)) * 100 : 0;
    const el = document.getElementById('closePnlPreview');
    el.textContent = TArenaUI.fmtMoney(pnl,{sign:true,decimals:2}) + ' (' + TArenaUI.fmtPct(pct) + ')';
    el.className = 'val ' + (pnl >= 0 ? 'text-green' : 'text-red');
  }

  document.getElementById('closeExitPrice').addEventListener('input', updatePnlPreview);
  document.getElementById('closeModal').addEventListener('click', e => {
    if (e.target === document.getElementById('closeModal')) hideCloseModal();
  });

  async function confirmClose() {
    if (!closeModalState) return;
    const exit = parseFloat(document.getElementById('closeExitPrice').value);
    if (!isFinite(exit) || exit <= 0) {
      showToast('⚠️ Please enter a valid exit price.', 'red');
      return;
    }
    const btn = document.getElementById('closeConfirmBtn');
    btn.disabled = true;
    btn.textContent = 'Closing…';
    try {
      const { data, error } = await TArenaDB.rpc('close_trade', {
        p_trade_id:   closeModalState.tradeId,
        p_exit_price: exit,
      });
      if (error || !data?.ok) {
        showToast('❌ Close failed: ' + (data?.error || error?.message || 'Unknown error'), 'red');
        btn.disabled = false;
        btn.textContent = 'Close Position';
        return;
      }
      const pnl = data.pnl;
      const sym = closeModalState.symbol.replace('.AX','');
      hideCloseModal();
      showToast(
        (pnl >= 0 ? '✅ ' : '❌ ') + sym + ' closed · ' + TArenaUI.fmtMoney(pnl,{sign:true,decimals:2}),
        pnl >= 0 ? 'green' : 'red'
      );
      await loadAndRender();
    } catch(e) {
      showToast('❌ Close failed: ' + e.message, 'red');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Close Position';
    }
  }

  // ============================================================
  // TOAST
  // ============================================================
  function showToast(msg, color) {
    let t = document.getElementById('pfToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'pfToast';
      t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy2);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;z-index:2000;transition:opacity .3s;max-width:90vw;text-align:center;';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.color = color === 'green' ? '#4ade80' : color === 'red' ? '#f87171' : 'var(--cream)';
    t.style.opacity = '1';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3500);
  }

  // ============================================================
  // TRADE HISTORY
  // ============================================================
  async function loadTradeHistory() {
    const { data, error } = await TArenaDB
      .from('paper_trades')
      .select('id,symbol,market,side,qty,entry_price,exit_price,opened_at,closed_at,status')
      .eq('status','closed')
      .order('closed_at',{ascending:false})
      .limit(100);
    if (error) { console.warn('history load failed', error.message); return []; }
    return data || [];
  }

  function renderHistory(trades) {
    const el = document.getElementById('historyList');
    document.getElementById('histCount').textContent = trades.length + ' trades';
    if (!trades.length) {
      el.innerHTML = '<div class="empty-row">No closed trades yet. Close a position to see it here.</div>';
      return;
    }
    el.innerHTML = trades.map(t => {
      const sym = t.symbol.replace('.AX','');
      const type = t.symbol.endsWith('.AX') ? 'asx' : (t.market === 'crypto' ? 'crypto' : 'us');
      const initials = sym.slice(0,3);
      const pnl = t.side === 'sell'
        ? (t.entry_price - t.exit_price) * t.qty
        : (t.exit_price - t.entry_price) * t.qty;
      const pct = t.entry_price > 0 ? (pnl / (t.entry_price * t.qty)) * 100 : 0;
      const up = pnl >= 0;
      const dt = t.closed_at ? new Date(t.closed_at).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}) : '—';
      const escSym = sym.replace(/[<>&"']/g,'');
      return `<div class="hist-row">
        <div class="icn ${type}">${initials}</div>
        <div class="meta">
          <div class="sym">${escSym} <span style="font-size:11px;font-weight:500;color:var(--muted);">${t.side.toUpperCase()}</span></div>
          <div class="dt">${dt}</div>
        </div>
        <div class="prices">
          <b>${TArenaUI.fmtMoney(t.exit_price,{decimals:2})}</b>
          Entry ${TArenaUI.fmtMoney(t.entry_price,{decimals:2})} · ${Number(t.qty).toLocaleString('en-US',{maximumFractionDigits:4})} shares
        </div>
        <div class="rpnl">
          <div class="v ${up?'text-green':'text-red'}">${TArenaUI.fmtMoney(pnl,{sign:true,decimals:2})}</div>
          <div class="p ${up?'text-green':'text-red'}">${TArenaUI.fmtPct(pct)}</div>
        </div>
      </div>`;
    }).join('');
  }

  // ============================================================
  // PAGE TABS
  // ============================================================
  let activeTab = 'holdings';
  document.getElementById('pfTabs').addEventListener('click', async e => {
    const t = e.target.dataset.t;
    if (!t || t === activeTab) return;
    activeTab = t;
    document.querySelectorAll('.pf-tab').forEach(b => b.classList.toggle('on', b.dataset.t === t));
    document.getElementById('holdingsSection').style.display = t === 'holdings' ? '' : 'none';
    document.getElementById('historySection').style.display  = t === 'history'  ? '' : 'none';
    if (t === 'history') {
      document.getElementById('historyList').innerHTML = '<div class="empty-row">Loading…</div>';
      const trades = await loadTradeHistory();
      renderHistory(trades);
    }
  });

  // Wire up tabs
  document.getElementById('trTabs').addEventListener('click', e => {
    if (!e.target.dataset.r) return;
    activeRange = e.target.dataset.r;
    document.querySelectorAll('.tr-tab').forEach(b => b.classList.toggle('on', b === e.target));
    renderChart();
  });
  document.getElementById('hFilter').addEventListener('click', e => {
    if (!e.target.dataset.m) return;
    activeMarket = e.target.dataset.m;
    document.querySelectorAll('.h-pill').forEach(b => b.classList.toggle('on', b === e.target));
    renderHoldings();
  });

  async function loadAndRender() {
    const raw    = await loadHoldings();
    const quotes = await loadQuotes(raw.map(h => h.symbol));
    recomputePortfolio(raw, quotes);
    renderHero();
    renderAllocation();
    renderHoldings();
    renderMovers();
    renderChart();
  }

  // Light refresh — just re-quote and recompute (cheap). Skip the
  // full holdings reload; positions only change via the Trade page,
  // which navigates away from here.
  async function refreshQuotes() {
    if (!portfolio.holdings.length) return;
    const quotes = await loadQuotes(portfolio.holdings.map(h => h.symbol));
    recomputePortfolio(portfolio.holdings.map(({symbol,qty,avgCost,type,name}) => ({symbol,qty,avgCost,type,name})), quotes);
    renderHero();
    renderAllocation();
    renderHoldings();
  }

  loadAndRender();
  setInterval(refreshQuotes, 15000);

  console.log('%cTradeArena · Portfolio loaded', 'color:#e8c060;font-weight:700;');
</script>
<script>
  // TradeArena · PWA service-worker registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/service-worker.js').catch(function (err) {
        console.warn('[TradeArena] SW registration failed:', err);
      });
    });
  }
</script>
</body>
