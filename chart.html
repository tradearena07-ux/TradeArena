<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#c9a030"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="TradeArena"/>
  <link rel="apple-touch-icon" href="/assets/icon-192.png"/>
<title>TradeArena · Terminal</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&amp;family=DM+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/styles.css"/>
  <style>
    /* =================================================================
       chart.html — Groww-style "Terminal" page. Full-screen chart with
       drawing tools, indicators, timeframe row, and a right rail with
       Chain / Positions / Orders / Watchlist / Depth / Holdings /
       Balance tabs. Symbol comes from ?symbol=BHP.AX query param.
       ================================================================= */
    body{display:flex;flex-direction:column;min-height:100vh;background:var(--navy);color:var(--cream);}

    /* ---- Slim top bar (Groww keeps it tiny on Terminal) ---- */
    .tt{position:sticky;top:0;z-index:100;background:rgba(9,21,40,.94);backdrop-filter:blur(14px);
        border-bottom:1px solid var(--bdl);padding:8px 16px;display:flex;align-items:center;gap:14px;}
    .tt-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
    .tt-logo span{font-family:'Cinzel',serif;font-size:15px;color:var(--cream);font-weight:700;letter-spacing:.04em;}
    .tt-logo span b{color:var(--gold2);}
    .tt-title{font-size:12px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;font-weight:700;
              padding-left:14px;border-left:1px solid var(--bdl);}
    .tt-title b{color:var(--gold2);margin-left:4px;}
    .tt-search{flex:1;max-width:340px;position:relative;}
    .tt-search input{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:9999px;
                     padding:7px 12px 7px 32px;color:var(--cream);font-family:inherit;font-size:12px;outline:none;}
    .tt-search input:focus{border-color:var(--gold);}
    .tt-search > i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:11px;}
    .tt-search .results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--navy3);
                        border:1px solid var(--border);border-radius:8px;max-height:300px;overflow-y:auto;
                        z-index:120;display:none;box-shadow:0 12px 36px rgba(0,0,0,.5);}
    .tt-search .results.open{display:block;}
    .tt-search .res{padding:8px 12px;cursor:pointer;display:flex;justify-content:space-between;border-bottom:1px solid var(--bdl);}
    .tt-search .res:last-child{border-bottom:none;}
    .tt-search .res:hover{background:rgba(201,160,48,.08);}
    .tt-search .res .l{font-weight:700;font-size:12px;color:var(--cream);}
    .tt-search .res .n{font-size:10.5px;color:var(--muted);margin-top:1px;}
    .tt-back{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:inherit;
             padding:6px 12px;border-radius:7px;font-size:11.5px;cursor:pointer;text-decoration:none;
             display:inline-flex;align-items:center;gap:6px;}
    .tt-back:hover{border-color:var(--gold);color:var(--cream);}

    /* ---- Index strip (NIFTY/SENSEX style) ---- */
    .ix{display:flex;gap:0;overflow-x:auto;background:var(--navy2);border-bottom:1px solid var(--bdl);
        padding:6px 12px;font-size:11.5px;scrollbar-width:none;}
    .ix::-webkit-scrollbar{display:none;}
    .ix-it{display:inline-flex;align-items:baseline;gap:6px;padding:0 14px;border-right:1px solid var(--bdl);white-space:nowrap;}
    .ix-it:last-child{border-right:none;}
    .ix-n{color:var(--muted);font-weight:600;letter-spacing:.04em;}
    .ix-p{color:var(--cream);font-weight:700;font-feature-settings:'tnum';}
    .ix-c{font-weight:600;font-feature-settings:'tnum';font-size:11px;}
    .ix-c.up{color:var(--green);} .ix-c.dn{color:var(--red);}

    /* ---- Symbol header sub-bar ---- */
    .sh{display:flex;align-items:center;gap:18px;padding:10px 16px;border-bottom:1px solid var(--bdl);
        background:var(--navy);flex-wrap:wrap;}
    .sh-sym{display:flex;align-items:center;gap:10px;}
    .sh-icn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
            font-size:11px;font-weight:700;color:var(--navy);background:linear-gradient(135deg,#c9a030,#e8c060);}
    .sh-name{font-family:'DM Sans',sans-serif;}
    .sh-name .t{font-size:15px;font-weight:700;color:var(--cream);letter-spacing:.04em;}
    .sh-name .x{font-size:10.5px;color:var(--muted);margin-top:1px;letter-spacing:.06em;}
    .sh-x{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:4px;
          background:rgba(201,160,48,.15);color:var(--gold2);margin-left:6px;letter-spacing:.06em;}
    .sh-quote{display:flex;align-items:baseline;gap:10px;font-feature-settings:'tnum';}
    .sh-px{font-family:'DM Sans',sans-serif;font-size:1.55rem;font-weight:700;color:var(--cream);line-height:1;}
    .sh-ch{font-size:13px;font-weight:700;}
    .sh-ch.up{color:var(--green);} .sh-ch.dn{color:var(--red);}
    .sh-ohlc{display:flex;gap:14px;font-size:10.5px;color:var(--muted);font-feature-settings:'tnum';
             padding-left:14px;border-left:1px solid var(--bdl);flex-wrap:wrap;}
    .sh-ohlc div{display:flex;flex-direction:column;gap:2px;}
    .sh-ohlc .lbl{text-transform:uppercase;letter-spacing:.08em;font-size:9.5px;font-weight:700;}
    .sh-ohlc .val{color:var(--cream);font-size:11.5px;font-weight:600;}
    .sh-actions{margin-left:auto;display:flex;gap:8px;}
    .sh-buy,.sh-sell{padding:9px 22px;border:none;border-radius:8px;font-family:inherit;font-weight:700;
                     font-size:12px;letter-spacing:.06em;cursor:pointer;text-transform:uppercase;}
    .sh-buy{background:var(--green);color:var(--navy);}
    .sh-sell{background:var(--red);color:#fff;}
    .sh-buy:hover{filter:brightness(1.1);} .sh-sell:hover{filter:brightness(1.1);}

    /* ---- Main grid: left tools | center chart | right rail ---- */
    .gr{display:grid;grid-template-columns:44px 1fr 320px;flex:1;min-height:0;}
    @media(max-width:980px){
      .gr{grid-template-columns:44px 1fr;}
      .rr{display:none;}
    }

    /* ---- Left drawing-tools rail ---- */
    .dr{background:var(--navy2);border-right:1px solid var(--bdl);padding:8px 0;display:flex;flex-direction:column;
        gap:2px;align-items:center;}
    .dr-btn{width:34px;height:34px;background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;
            border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
    .dr-btn:hover{background:rgba(201,160,48,.1);color:var(--cream);}
    .dr-btn.on{background:rgba(201,160,48,.2);color:var(--gold2);}
    .dr-sep{width:24px;height:1px;background:var(--bdl);margin:6px 0;}

    /* ---- Center chart column ---- */
    .cc{display:flex;flex-direction:column;background:var(--navy);min-height:0;}
    .cc-head{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--bdl);font-size:11px;}
    .cc-head .live{display:inline-flex;align-items:center;gap:5px;color:var(--green);font-weight:700;letter-spacing:.06em;}
    .cc-head .live .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:livePulse 2s infinite;}
    @keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.4;}}
    .cc-head .right{margin-left:auto;display:flex;align-items:center;gap:6px;}
    .cc-tool{background:transparent;border:1px solid transparent;color:var(--muted);font-family:inherit;font-size:11px;
             padding:4px 9px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-weight:600;}
    .cc-tool:hover{border-color:var(--bdl);color:var(--cream);}
    .cc-tool.on{background:rgba(201,160,48,.15);color:var(--gold2);border-color:rgba(201,160,48,.3);}
    .cc-pane{flex:1;min-height:0;position:relative;}
    .cc-pane.indicator{flex:0 0 110px;border-top:1px solid var(--bdl);}
    .cc-pane.indicator .label{position:absolute;top:5px;left:8px;font-size:10px;font-weight:700;color:var(--gold2);
                              letter-spacing:.08em;z-index:5;text-shadow:0 0 6px var(--navy);}
    .cc-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
                background:rgba(6,14,28,.6);font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.04em;
                pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;}
    .cc-loading.on{opacity:1;}
    .cc-loading i{margin-right:8px;animation:spin 1s linear infinite;color:var(--gold2);}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ---- Bottom timeframe + indicator dropdown row ---- */
    .tf{display:flex;align-items:center;gap:4px;padding:6px 12px;border-top:1px solid var(--bdl);background:var(--navy2);
        font-size:11px;flex-wrap:wrap;}
    .tf-btn{background:transparent;border:1px solid transparent;color:var(--muted);font-family:inherit;font-size:11px;
            padding:4px 11px;border-radius:6px;cursor:pointer;font-weight:700;letter-spacing:.04em;}
    .tf-btn:hover{color:var(--cream);}
    .tf-btn.on{background:rgba(201,160,48,.18);color:var(--gold2);}
    .tf-sep{width:1px;height:18px;background:var(--bdl);margin:0 8px;}
    .ind-wrap{position:relative;}
    .ind-tg{background:transparent;border:1px solid var(--bdl);color:var(--muted);font-family:inherit;font-size:10.5px;
      font-weight:700;letter-spacing:.05em;padding:5px 10px;border-radius:6px;cursor:pointer;transition:.15s;margin-left:4px;}
    .ind-tg:hover{color:var(--cream);border-color:var(--gold);}
    .ind-tg.on{background:rgba(201,160,48,.22);border-color:rgba(201,160,48,.55);color:var(--gold2);}
    .ind-btn{background:var(--navy3);border:1px solid var(--bdl);color:var(--cream);font-family:inherit;font-size:11px;
             padding:5px 12px;border-radius:6px;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
    .ind-btn:hover{border-color:var(--gold);}
    .ind-menu{position:absolute;bottom:calc(100% + 6px);left:0;background:var(--navy2);border:1px solid var(--border);
              border-radius:9px;padding:6px;min-width:180px;display:none;z-index:50;box-shadow:0 12px 36px rgba(0,0,0,.5);}
    .ind-menu.open{display:block;}
    .ind-row{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border-radius:6px;
             font-size:12px;color:var(--cream);}
    .ind-row:hover{background:rgba(201,160,48,.08);}
    .ind-row .sw{width:30px;height:16px;border-radius:9999px;background:var(--navy4);position:relative;flex-shrink:0;
                 transition:background .15s;}
    .ind-row .sw::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;
                       background:var(--muted);transition:all .15s;}
    .ind-row.on .sw{background:rgba(201,160,48,.4);}
    .ind-row.on .sw::after{left:16px;background:var(--gold2);}

    /* ---- Right rail (tabs + content) ---- */
    .rr{background:var(--navy2);border-left:1px solid var(--bdl);display:flex;flex-direction:column;min-height:0;}
    .rr-tabs{display:flex;border-bottom:1px solid var(--bdl);overflow-x:auto;scrollbar-width:none;}
    .rr-tabs::-webkit-scrollbar{display:none;}
    .rr-tab{flex-shrink:0;padding:10px 12px;background:transparent;border:none;border-bottom:2px solid transparent;
            color:var(--muted);font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.06em;cursor:pointer;
            text-transform:uppercase;}
    .rr-tab:hover{color:var(--cream);}
    .rr-tab.on{color:var(--gold2);border-bottom-color:var(--gold);}
    .rr-body{flex:1;min-height:0;overflow-y:auto;padding:10px;font-size:12px;}
    .rr-empty{padding:30px 16px;text-align:center;color:var(--muted);font-size:12px;}
    .rr-empty i{font-size:24px;color:var(--gold2);opacity:.6;display:block;margin-bottom:10px;}

    /* Chain (options) */
    .ch-head{display:grid;grid-template-columns:1fr 70px 1fr;gap:6px;padding:6px 4px;font-size:10px;color:var(--muted);
             text-transform:uppercase;letter-spacing:.08em;font-weight:700;border-bottom:1px solid var(--bdl);}
    .ch-head .c{text-align:center;}
    .ch-row{display:grid;grid-template-columns:1fr 70px 1fr;gap:6px;padding:7px 4px;border-bottom:1px solid var(--bdl);
            font-feature-settings:'tnum';}
    .ch-row:hover{background:rgba(201,160,48,.04);}
    .ch-call{color:var(--green);font-weight:700;font-size:11.5px;text-align:right;}
    .ch-call .v{color:var(--cream);font-weight:600;font-size:10px;}
    .ch-strike{text-align:center;color:var(--gold2);font-weight:700;font-size:11.5px;background:var(--navy3);border-radius:4px;}
    .ch-put{color:var(--red);font-weight:700;font-size:11.5px;}
    .ch-put .v{color:var(--cream);font-weight:600;font-size:10px;}
    .ch-itm-call{background:rgba(74,222,128,.08);}
    .ch-itm-put{background:rgba(248,113,113,.08);}
    .ch-atm{background:rgba(201,160,48,.18);border-top:1px solid rgba(201,160,48,.45);
            border-bottom:1px solid rgba(201,160,48,.45);}
    .ch-atm .ch-strike{background:var(--gold);color:var(--navy1);}
    .sim-note{font-size:10px;color:var(--muted);font-style:italic;margin-left:auto;letter-spacing:.04em;}
    .sim-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(168,193,219,.1);color:var(--muted);
              border:1px solid var(--bdl);border-radius:9999px;padding:2px 8px;font-size:9.5px;font-weight:700;
              letter-spacing:.08em;text-transform:uppercase;}

    /* Depth */
    .dp{display:flex;flex-direction:column;}
    .dp-h{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:6px 4px;font-size:10px;color:var(--muted);
          text-transform:uppercase;letter-spacing:.08em;font-weight:700;border-bottom:1px solid var(--bdl);}
    .dp-h .r{text-align:right;}
    .dp-row{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:5px 6px;
            font-feature-settings:'tnum';font-size:11.5px;border-bottom:1px solid rgba(168,193,219,.04);}
    .dp-row .px{font-weight:700;}
    .dp-row .qty{text-align:right;color:var(--cream);}
    .dp-row.bid .px{color:var(--green);}
    .dp-row.ask .px{color:var(--red);}
    .dp-row .bar{position:absolute;top:0;bottom:0;right:0;background:rgba(74,222,128,.08);z-index:0;}
    .dp-row.ask .bar{background:rgba(248,113,113,.08);left:0;right:auto;}
    .dp-row > *{position:relative;z-index:1;}
    .dp-spread{padding:6px;text-align:center;font-size:10px;color:var(--muted);background:var(--navy3);
               border-top:1px solid var(--bdl);border-bottom:1px solid var(--bdl);font-weight:700;letter-spacing:.06em;}

    /* Generic list rows (Positions / Orders / Holdings / Watchlist) */
    .li-row{display:flex;justify-content:space-between;align-items:center;padding:9px 8px;border-bottom:1px solid var(--bdl);
            cursor:pointer;}
    .li-row:hover{background:rgba(201,160,48,.04);}
    .li-row .l{display:flex;flex-direction:column;gap:2px;}
    .li-row .l .s{font-weight:700;color:var(--cream);font-size:12px;letter-spacing:.04em;}
    .li-row .l .n{color:var(--muted);font-size:10.5px;}
    .li-row .r{text-align:right;display:flex;flex-direction:column;gap:2px;}
    .li-row .r .p{font-weight:700;color:var(--cream);font-feature-settings:'tnum';font-size:12px;}
    .li-row .r .c{font-feature-settings:'tnum';font-size:10.5px;font-weight:600;}
    .li-row .r .c.up{color:var(--green);} .li-row .r .c.dn{color:var(--red);}

    .bal-card{background:var(--navy3);border:1px solid var(--bdl);border-radius:10px;padding:14px;margin-bottom:8px;}
    .bal-card .lbl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;}
    .bal-card .v{font-family:'DM Sans',sans-serif;font-size:1.4rem;font-weight:700;color:var(--cream);
                 font-feature-settings:'tnum';margin-top:4px;}
    .bal-card .sub{font-size:11px;color:var(--muted);margin-top:4px;}

    .demo-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(251,191,36,.12);color:#fbbf24;
               border:1px solid rgba(251,191,36,.25);border-radius:9999px;padding:2px 8px;font-size:9.5px;font-weight:700;
               letter-spacing:.08em;text-transform:uppercase;margin-left:auto;}
  </style>
</head>
<body>

<!-- ======== Slim top bar ======== -->
<header class="tt">
  <a href="trade.html" class="tt-logo">
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
      <path d="M16 3 L28 9 V20 C28 24 22 28 16 30 C10 28 4 24 4 20 V9 Z" stroke="#e8c060" stroke-width="2" fill="none"/>
      <path d="M9 19 L13 15 L17 18 L23 11" stroke="#e8c060" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Trade<b>Arena</b></span>
  </a>
  <div class="tt-title">Terminal <b id="ttSym">—</b></div>
  <div class="tt-search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchBox" placeholder="Search symbol… (BHP, AAPL, BTC)" autocomplete="off"/>
    <div class="results" id="searchResults"></div>
  </div>
  <a href="trade.html" class="tt-back"><i class="fa-solid fa-arrow-left"></i> Back to Markets</a>
</header>

<!-- ======== Index strip ======== -->
<div class="ix" id="ixStrip"></div>

<!-- ======== Symbol header ======== -->
<section class="sh">
  <div class="sh-sym">
    <div class="sh-icn" id="shIcn">—</div>
    <div class="sh-name">
      <div class="t" id="shTitle">Loading…<span class="sh-x" id="shX">—</span></div>
      <div class="x" id="shSubtitle">—</div>
    </div>
  </div>
  <div class="sh-quote">
    <div class="sh-px" id="shPx">$—</div>
    <div class="sh-ch" id="shCh">—</div>
  </div>
  <div class="sh-ohlc">
    <div><span class="lbl">Open</span><span class="val" id="shO">—</span></div>
    <div><span class="lbl">High</span><span class="val" id="shH">—</span></div>
    <div><span class="lbl">Low</span><span class="val" id="shL">—</span></div>
    <div><span class="lbl">Prev close</span><span class="val" id="shPc">—</span></div>
    <div><span class="lbl">Volume</span><span class="val" id="shV">—</span></div>
    <div><span class="lbl">52W high</span><span class="val" id="shHy">—</span></div>
    <div><span class="lbl">52W low</span><span class="val" id="shLy">—</span></div>
  </div>
  <div class="sh-actions">
    <button class="sh-buy"  id="btnBuy">Buy</button>
    <button class="sh-sell" id="btnSell">Sell</button>
  </div>
</section>

<!-- ======== Main grid ======== -->
<div class="gr">

  <!-- Left drawing tools rail (visual only with Lightweight Charts) -->
  <aside class="dr">
    <button class="dr-btn on" data-tool="cursor" title="Cursor"><i class="fa-solid fa-arrow-pointer"></i></button>
    <button class="dr-btn"    data-tool="trend"  title="Trend line"><i class="fa-solid fa-chart-line"></i></button>
    <button class="dr-btn"    data-tool="hline"  title="Horizontal line"><i class="fa-solid fa-grip-lines"></i></button>
    <button class="dr-btn"    data-tool="rect"   title="Rectangle"><i class="fa-regular fa-square"></i></button>
    <button class="dr-btn"    data-tool="fib"    title="Fibonacci retracement"><i class="fa-solid fa-wave-square"></i></button>
    <button class="dr-btn"    data-tool="text"   title="Text"><i class="fa-solid fa-font"></i></button>
    <div class="dr-sep"></div>
    <button class="dr-btn"    data-tool="eraser" title="Eraser"><i class="fa-solid fa-eraser"></i></button>
    <button class="dr-btn"    data-tool="undo"   title="Undo"><i class="fa-solid fa-rotate-left"></i></button>
  </aside>

  <!-- Center chart column -->
  <main class="cc">
    <div class="cc-head">
      <span class="live"><span class="dot"></span>LIVE</span>
      <span style="color:var(--muted);">refresh 15s</span>
      <div class="right">
        <button class="cc-tool on" data-st="candles" title="Candles"><i class="fa-solid fa-chart-simple"></i> Candles</button>
        <button class="cc-tool"    data-st="line"    title="Line"><i class="fa-solid fa-chart-line"></i> Line</button>
        <button class="cc-tool"    data-st="area"    title="Area"><i class="fa-solid fa-chart-area"></i> Area</button>
      </div>
    </div>
    <div class="cc-pane" id="paneMain">
      <div class="cc-loading on" id="loadMain"><i class="fa-solid fa-circle-notch"></i>Loading chart…</div>
    </div>

// ---- Helpers ----
function fmtMoney(n, dp){
  if (n == null || !isFinite(n) || n === 0) return '$—';
  const d = dp != null ? dp : (Math.abs(n) < 10 ? 4 : 2);
  return '$' + Number(n).toLocaleString('en-AU',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function fmtNum(n, dp){
  if (n == null || !isFinite(n) || n === 0) return '—';
  const d = dp != null ? dp : (Math.abs(n) < 10 ? 4 : 2);
  return Number(n).toLocaleString('en-AU',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function fmtPct(n){
  if (n == null || !isFinite(n)) return '0.00%';
  return (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%';
}
function fmtVol(n){
  if (n == null || !isFinite(n)) return '—';
  if (n >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Math.round(n).toString();
}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function tfToResolution(tf){
  return {'1m':'1','5m':'5','15m':'15','1h':'60','4h':'240','1D':'D','1W':'W','1M':'M'}[tf] || 'D';
}
function tfWindowSec(tf){
  // Trailing window (in seconds) appropriate for each timeframe.
  const map = {'1m':3*86400,'5m':10*86400,'15m':30*86400,'1h':60*86400,'4h':180*86400,'1D':2*365*86400,'1W':5*365*86400,'1M':10*365*86400};
  return map[tf] || 365*86400;
}
function decimalsForPrice(p){ return p == null || p === 0 ? 2 : (Math.abs(p) < 10 ? 4 : 2); }
function iconLabel(sym){
  if (sym.endsWith('.AX')) return sym.slice(0,-3).slice(0,3);
  if (sym.length === 6 && CATALOG[sym]?.market === 'forex') return sym.slice(0,3);
  return sym.slice(0,4);
}

// Sync time-axis range across stacked panes so they scroll together.

// ----- Indicator math -----
function ema(values, period){
  if (!values.length) return [];
  const k = 2/(period+1); const out = new Array(values.length).fill(null);
  let acc = 0;
  for (let i=0;i<values.length;i++){
    if (i < period){ acc += values[i]; if (i === period-1) out[i] = acc/period; continue; }
    out[i] = values[i]*k + out[i-1]*(1-k);
  }
  return out;
}
function sma(values, period){
  const out = new Array(values.length).fill(null);
  let s = 0;
  for (let i=0;i<values.length;i++){
    s += values[i];
    if (i >= period) s -= values[i-period];
    if (i >= period-1) out[i] = s/period;
  }
  return out;
}
function bollinger(values, period, mult){
  const m = sma(values, period);
  const upper = new Array(values.length).fill(null);
  const lower = new Array(values.length).fill(null);
  for (let i=0;i<values.length;i++){
    if (m[i] == null) continue;
    let v = 0;
    for (let j=i-period+1;j<=i;j++) v += (values[j]-m[i])**2;
    const sd = Math.sqrt(v/period);
    upper[i] = m[i] + mult*sd; lower[i] = m[i] - mult*sd;
  }
  return { mid:m, upper, lower };
}
function rsi(values, period){
  const out = new Array(values.length).fill(null);
  if (values.length <= period) return out;
  let gain = 0, loss = 0;
  for (let i=1;i<=period;i++){
    const d = values[i]-values[i-1];
    if (d >= 0) gain += d; else loss -= d;
  }
  gain/=period; loss/=period;
  // When losses are zero RSI is defined as 100 (max strength), not the
  // approximation we'd get from feeding 100 into the RS ratio.
  out[period] = loss === 0 ? 100 : 100 - 100/(1 + gain/loss);
  for (let i=period+1;i<values.length;i++){
    const d = values[i]-values[i-1];
    const g = d > 0 ? d : 0, l = d < 0 ? -d : 0;
    gain = (gain*(period-1) + g)/period;
    loss = (loss*(period-1) + l)/period;
    out[i] = loss === 0 ? 100 : 100 - 100/(1 + gain/loss);
  }
  return out;
}
function macd(values, fast, slow, signal){
  const ef = ema(values, fast), es = ema(values, slow);
  const line = values.map((_,i) => (ef[i] != null && es[i] != null) ? ef[i]-es[i] : null);
  // Compute signal EMA over the contiguous valid MACD-line points only,
  // then re-align the result with the original series so we don't bias
  // the signal with leading zeros (which would distort early bars).
  const compact = []; const idx = [];
  for (let i=0;i<line.length;i++) if (line[i] != null){ compact.push(line[i]); idx.push(i); }
  const sigCompact = ema(compact, signal);
  const sig = new Array(values.length).fill(null);
  for (let i=0;i<idx.length;i++) sig[idx[i]] = sigCompact[i];
  const hist = line.map((v,i) => (v == null || sig[i] == null) ? null : v - sig[i]);
  return { line, signal: sig, hist };
}

// Convert {t,o,h,l,c,v} → Lightweight Charts series rows. Time is in
// seconds (intraday) or in YYYY-MM-DD form (daily/weekly/monthly) so
// the time axis displays calendar dates without timezone slop.
function toLwcRows(bars, daily){
  return bars.map(b => {
    const tSec = Math.floor(b.t/1000);
    if (daily) {
      const d = new Date(b.t);
      const time = d.toISOString().slice(0,10);
      return { time, open:b.o, high:b.h, low:b.l, close:b.c, value:b.v };
    }
    return { time: tSec, open:b.o, high:b.h, low:b.l, close:b.c, value:b.v };
  });
}

function applyOverlays(){
  if (!mainSeries) return;
  // Tear down any previous overlays so toggles re-render cleanly.
  for (const k of Object.keys(overlaySeries)){
    try { mainChart.removeSeries(overlaySeries[k]); } catch(_) {}
    delete overlaySeries[k];
  }
  if (!state.bars.length) return;
  const closes = state.bars.map(b => b.c);
  const daily = ['1D','1W','1M'].includes(state.tf);
  const times = state.bars.map(b => {
    const d = new Date(b.t);
    return daily ? d.toISOString().slice(0,10) : Math.floor(b.t/1000);
  });
  // Helper: add a line overlay with optional dashed style. lineStyle 0 =
  // solid, 2 = dashed in Lightweight Charts.
  const setLine = (id, color, vals, opts = {}) => {
    const s = mainChart.addLineSeries({
      color,
      lineWidth: opts.width || 1,
      lineStyle: opts.dashed ? 2 : 0,
      priceLineVisible: false,
      lastValueVisible: false,
    });
    const data = vals.map((v,i) => v == null ? null : { time: times[i], value: v }).filter(Boolean);
    s.setData(data); overlaySeries[id] = s;
  };
  // MA group — SMA 20 (gold), SMA 50 (blue), SMA 200 (red).
  if (state.indicators.ma) {
    setLine('ma20',  '#e8c060', sma(closes, 20),  { width:2 });
    setLine('ma50',  '#60a5fa', sma(closes, 50),  { width:2 });
    setLine('ma200', '#f87171', sma(closes, 200), { width:2 });
  }
  // EMA 9 — thin white line for fast trend.
  if (state.indicators.ema) {
    setLine('ema9', '#ffffff', ema(closes, 9), { width:1 });
  }
  // Bollinger Bands — dashed gold envelope around a grey middle line.
  if (state.indicators.bb) {
    const bb = bollinger(closes, 20, 2);
    setLine('bbU', '#c9a030', bb.upper, { dashed:true });
    setLine('bbM', 'rgba(168,193,219,0.5)', bb.mid);
    setLine('bbL', '#c9a030', bb.lower, { dashed:true });
  }
  // RSI pane
  if (state.indicators.rsi){
    ensureRSI();
    const r = rsi(closes, 14);
    rsiSeries.setData(r.map((v,i) => v == null ? null : { time: times[i], value: v }).filter(Boolean));
    rsiHi.setData(times.map(t => ({time:t, value:70})));
    rsiLo.setData(times.map(t => ({time:t, value:30})));
  } else { destroyRSI(); }
  // MACD pane
  if (state.indicators.macd){
    ensureMACD();
    const m = macd(closes, 12, 26, 9);
    macdLine.setData(m.line.map((v,i) => v == null ? null : { time: times[i], value: v }).filter(Boolean));
    macdSig .setData(m.signal.map((v,i) => v == null ? null : { time: times[i], value: v }).filter(Boolean));
    macdHist.setData(m.hist.map((v,i) => v == null ? null : { time: times[i], value: v, color: v >= 0 ? 'rgba(74,222,128,0.6)' : 'rgba(248,113,113,0.6)' }).filter(Boolean));
  } else { destroyMACD(); }
}

async function loadBars(){
  ensureMainChart();
  const tk = ++state.fetchToken;
  document.getElementById('loadMain').classList.add('on');
  const tfRes = tfToResolution(state.tf);
  const now = Math.floor(Date.now()/1000);
  const fromSec = now - tfWindowSec(state.tf);
  // ---- PARALLEL bar fetch: race all sources simultaneously ----
  // Whichever source returns valid bars first wins. This eliminates the
  // sequential timeout chain that made the chart feel slow.
  const normChartBars = (raw) => (raw || []).filter(b => isFinite(b.c || b.close) && (b.c || b.close) > 0).map(b => ({
    t: b.t || (b.time ? b.time * 1000 : 0),
    o: b.o ?? b.open ?? 0,
    h: b.h ?? b.high ?? 0,
    l: b.l ?? b.low ?? 0,
    c: b.c ?? b.close ?? 0,
    v: b.v ?? b.volume ?? 0,
  })).slice(-1000);

  const barRaces = [];
  // Source 1: TArenaDatafeed edge function
  barRaces.push(
    window.TArenaDatafeed.fetchBars(state.symbol, tfRes, fromSec, now)
      .then(raw => normChartBars(raw))
      .catch(() => [])
  );
  // Source 2: Yahoo direct via CORS proxies
  if (state.symbol) {
    barRaces.push(
      getChartData(state.symbol, state.tf)
        .then(raw => normChartBars(raw))
        .catch(() => [])
    );
  }
  // Source 3: MarketData centralized engine
  if (state.symbol && window.MarketData) {
    const isASX = state.symbol.endsWith('.AX');
    const cleanSym = isASX ? state.symbol.replace('.AX', '') : state.symbol;
    barRaces.push(
      window.MarketData.fetchChartHistory(cleanSym, isASX, state.tf)
        .then(raw => normChartBars(raw))
        .catch(() => [])
    );
  }
  let bars = [];
  try {
    bars = await Promise.any(
      barRaces.map(p => p.then(b => b.length ? b : Promise.reject('empty')))
    );
  } catch (_) {
    // All sources returned empty
    bars = [];
  }
  if (!bars.length) bars = synthBars(state.tf, fromSec, now);
  // Single token check covers BOTH the success and error paths so a
  // stale request can never overwrite the current symbol/tf state.
  if (tk !== state.fetchToken) return;
  state.bars = bars;
  state.last = bars.length ? bars[bars.length-1].c : null;
  const daily = ['1D','1W','1M'].includes(state.tf);
  const rows = toLwcRows(bars, daily);
  // Recreate the main series whenever the chart style changes. Tracked
  // explicitly via mainSeriesKind because Lightweight Charts' seriesType()
  // helper isn't part of the stable v4 public API.
  if (state.style !== mainSeriesKind) {
    try { mainChart.removeSeries(mainSeries); } catch(_) {}
    if (state.style === 'candles') {
      mainSeries = mainChart.addCandlestickSeries({upColor:'#10b981',downColor:'#dc2626',borderUpColor:'#10b981',borderDownColor:'#dc2626',wickUpColor:'#10b981',wickDownColor:'#dc2626'});
    } else if (state.style === 'area') {
      mainSeries = mainChart.addAreaSeries({lineColor:'#e8c060',topColor:'rgba(232,192,96,0.4)',bottomColor:'rgba(232,192,96,0)'});
    } else {
      mainSeries = mainChart.addLineSeries({color:'#e8c060', lineWidth:2});
    }
    mainSeriesKind = state.style;
  }
  if (mainSeriesKind === 'candles') {
    mainSeries.setData(rows);
  } else {
    mainSeries.setData(rows.map(r => ({time:r.time, value:r.close})));
  }
  // Volume — always populated; toggle just hides the series via setData([]).
  if (volSeries) {
    if (state.indicators.vol) {
      volSeries.setData(rows.map(r => ({
        time: r.time,
        value: r.value || 0,
        // Up bars green, down bars red — matches the candle palette so the
        // volume pane reads at a glance.
        color: r.close >= r.open ? 'rgba(74,222,128,0.55)' : 'rgba(248,113,113,0.55)',
      })));
    } else {
      volSeries.setData([]);
    }
  }
  applyOverlays();
  linkAxes();
  mainChart.timeScale().fitContent();
  document.getElementById('loadMain').classList.remove('on');
  // Update header with last bar's OHLC
  if (bars.length) updateHeaderFromBars(bars);
  // Subscribe live ticks — TArenaDatafeed for crypto (Binance WS), plus
  // MarketData centralized engine as a supplementary 15s poll for all symbols.
  if (state.unsubLive) { try { state.unsubLive(); } catch(_) {} state.unsubLive = null; }
  if (window.TArenaDatafeed?.subscribeQuote) {
    state.unsubLive = window.TArenaDatafeed.subscribeQuote(state.symbol, q => {
      if (!q || !isFinite(q.price)) return;
      state.last = q.price;
      paintLivePrice(q);
    });
  }
  // MarketData centralized engine: listen for marketDataUpdated events
  // to keep the header price fresh even when TArenaDatafeed is offline.
  if (window.MarketData && !window._chartMdListener) {
    window._chartMdListener = function(e) {
      const md = e.detail;
      if (!md || !state.symbol) return;
      const sym = state.symbol.replace('.AX', '');
      const isASX = state.symbol.endsWith('.AX');
      let px = null;
      if (md.stocks && md.stocks[sym]) px = md.stocks[sym].price;
      if (!px && md.crypto && md.crypto[state.symbol]) px = md.crypto[state.symbol].price;
      if (px && isFinite(px) && px > 0) {
        state.last = px;
        paintLivePrice({ price: px });
      }
    };
    window.addEventListener('marketDataUpdated', window._chartMdListener);
  }
}

function synthBars(tf, fromSec, toSec){
  const stepSec = {'1m':60,'5m':300,'15m':900,'1h':3600,'4h':14400,'1D':86400,'1W':604800,'1M':2592000}[tf] || 86400;
  const n = Math.min(500, Math.floor((toSec-fromSec)/stepSec));
  const out = []; let p = 100;
  for (let i=0;i<n;i++){
    const t = (fromSec + i*stepSec)*1000;
    const r = (Math.random()-0.49)*0.02;
    const o = p, c = p*(1+r), h = Math.max(o,c)*(1+Math.random()*0.005), l = Math.min(o,c)*(1-Math.random()*0.005);
    out.push({t,o,h,l,c,v:Math.round(1e6*Math.random())});
    p = c;
  }
  return out;
}

function updateHeaderFromBars(bars){
  const last = bars[bars.length-1], prev = bars[bars.length-2] || last;
  const change = last.c - prev.c, pct = (change/prev.c)*100;
  document.getElementById('shPx').textContent = fmtMoney(last.c);
  const ch = document.getElementById('shCh');
  ch.textContent = (change >= 0 ? '+' : '') + fmtMoney(Math.abs(change)).slice(1) + ' (' + fmtPct(pct) + ')';
  ch.className = 'sh-ch ' + (change >= 0 ? 'up' : 'dn');
  document.getElementById('shO').textContent = fmtMoney(last.o);
  document.getElementById('shH').textContent = fmtMoney(last.h);
  document.getElementById('shL').textContent = fmtMoney(last.l);
  document.getElementById('shPc').textContent = fmtMoney(prev.c);
  document.getElementById('shV').textContent = fmtVol(last.v);

}

// ----- Chain (synthetic) -----
// Generate a synthetic 30-day options chain centred on spot. Strike
// spacing scales with price (sub-dollar tickers can't carry $5 strikes
// like AAPL can). Premiums = intrinsic + time-value, where time-value
// peaks ATM and decays as a Gaussian of log-moneyness — a cheap proxy
// for the Black-Scholes vega curve. Open interest is randomised once
// per render so the table has a realistic, uneven look.
function generateOptionsChain(spot, daysToExpiry = 30){
  const spacing = spot < 5 ? 0.5 : spot < 50 ? 1 : spot < 500 ? 5 : 50;
  const baseStrike = Math.round(spot/spacing)*spacing;
  const strikes = [];
  for (let i=-10;i<=10;i++) strikes.push(+(baseStrike + i*spacing).toFixed(4));
  const timeValue = spot * 0.02 * Math.sqrt(daysToExpiry/365) * 6;
  return strikes.map(K => {
    const moneyness = spot / K;
    const decay = Math.exp(-Math.pow(Math.log(moneyness), 2) * 5);
    const callIntrinsic = Math.max(0, spot - K);
    const putIntrinsic  = Math.max(0, K - spot);
    return {
      strike: K,
      call: { price: +(callIntrinsic + timeValue * decay).toFixed(2),
              oi:    Math.floor(Math.random() * 2000 + 100) },
      put:  { price: +(putIntrinsic  + timeValue * decay).toFixed(2),
              oi:    Math.floor(Math.random() * 2000 + 100) },
    };
  });
}

function renderChain(){
  const spot = state.last;
  if (!spot) return `<div class="rr-empty"><i class="fa-solid fa-link-slash"></i>Waiting for price…</div>`;
  const chain = generateOptionsChain(spot, 30);
  // ATM = strike closest to spot (smallest |spot-K|). Highlighted in gold.
  let atmIdx = 0, atmDist = Infinity;
  chain.forEach((r,i) => { const d = Math.abs(r.strike - spot); if (d < atmDist){ atmDist = d; atmIdx = i; } });
  const rows = chain.map((r,i) => {
    // Call ITM when strike < spot; put ITM when strike > spot. ATM
    // tint overrides ITM tint so the focal row stands out.
    let cls = '';
    if (i === atmIdx)        cls = 'ch-atm';
    else if (r.strike < spot) cls = 'ch-itm-call';
    else if (r.strike > spot) cls = 'ch-itm-put';
    return `<div class="ch-row ${cls}">
      <div class="ch-call">$${r.call.price.toFixed(2)}<div class="v">OI ${r.call.oi.toLocaleString()}</div></div>
      <div class="ch-strike">${r.strike}</div>
      <div class="ch-put">$${r.put.price.toFixed(2)}<div class="v">OI ${r.put.oi.toLocaleString()}</div></div>
    </div>`;
  }).join('');
  return `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
      <div style="font-size:11.5px;font-weight:700;color:var(--cream);letter-spacing:.05em;">OPTIONS · 30D EXPIRY</div>
      <span class="sim-pill">Simulated</span>
      <div class="sim-note" style="flex-basis:100%;margin-left:0;">Educational only — calculated from live spot, not exchange-traded.</div>
    </div>
    <div class="ch-head"><div>CALL</div><div class="c">STRIKE</div><div>PUT</div></div>
    ${rows}
  `;
}

// ----- Depth (synthetic order book) -----
function renderDepth(){
  const spot = state.last;
  if (!spot) return `<div class="rr-empty"><i class="fa-solid fa-layer-group"></i>Waiting for price…</div>`;
  const tick = spot < 5 ? 0.001 : spot < 50 ? 0.01 : spot < 500 ? 0.05 : 0.5;
  const ladder = (side, sign) => Array.from({length:10}, (_,i) => {
    const px = +(spot + sign*tick*(i+1)).toFixed(4);
    const qty = Math.round(50*Math.exp(-i*0.3) + Math.random()*50);
    const widthPct = Math.min(100, Math.round(qty));
    return `<div class="dp-row ${side}">
      <span class="bar" style="width:${widthPct}%"></span>
      <span class="px">${fmtNum(px)}</span><span class="qty">${qty.toLocaleString()}</span>
    </div>`;
  });
  // Asks render top-down with the highest ask at the top, so the array
  // is reversed before joining (closest-to-spread row sits next to the
  // SPREAD divider).
  const askHtml = ladder('ask', +1).reverse().join('');
  const bidHtml = ladder('bid', -1).join('');
  return `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <div style="font-size:11.5px;font-weight:700;color:var(--cream);letter-spacing:.05em;">ORDER BOOK · L2</div>
      <span class="sim-pill">Simulated</span>
    </div>
    <div class="dp">
      <div class="dp-h"><div>PRICE</div><div class="r">QTY</div></div>
      ${askHtml}
      <div class="dp-spread">SPREAD ${fmtMoney(tick)} · LAST ${fmtMoney(spot)}</div>
      ${bidHtml}
    </div>
  `;
}

// =====================================================================
//  YAHOO DIRECT — public-CORS-proxy fallback chain
// ---------------------------------------------------------------------
// The Supabase data-proxy edge function works for normal tickers, but
// index symbols (^AXJO / ^GSPC / ^IXIC) and the occasional rate-limited
// stock fetch return nothing. This block hits Yahoo Finance directly
// through three rotating public CORS proxies so the index strip, the
// symbol header and the chart all degrade gracefully when the edge
// function is unavailable. Crypto continues to use Binance via the
// existing TArenaDatafeed (more reliable than Yahoo for live ticks).
// =====================================================================
const YAHOO_PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];
// Yahoo treats ^AXJO/^GSPC/^IXIC as URL-safe when % -encoded — let the
// browser handle that via encodeURIComponent in the proxy wrappers.
async function yahooFetchJson(yahooUrl){
  for (const wrap of YAHOO_PROXIES){
    try {
      const ctl = new AbortController();
      const timer = setTimeout(() => ctl.abort(), 5000);
      const res = await fetch(wrap(yahooUrl), { signal: ctl.signal });
      clearTimeout(timer);
      if (!res.ok) continue;
      return await res.json();
    } catch(_){ /* try next proxy */ }
  }
  return null;
}
async function getLivePrice(symbol){
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=1d`;
  const data = await yahooFetchJson(url);
  const meta = data?.chart?.result?.[0]?.meta;
  if (!meta || !(meta.regularMarketPrice > 0)) return null;
  return {
    price:     meta.regularMarketPrice,
    changePct: meta.regularMarketChangePercent,
    change:    (meta.regularMarketPrice - (meta.chartPreviousClose ?? meta.previousClose ?? meta.regularMarketPrice)),
    open:      meta.regularMarketOpen,
    high:      meta.regularMarketDayHigh,
    low:       meta.regularMarketDayLow,
    prevClose: meta.chartPreviousClose ?? meta.previousClose,
    volume:    meta.regularMarketVolume,
  };
}
// Map our internal timeframe codes → Yahoo (interval, range) pairs.
const TF_YAHOO = {
  '1m':['1m','1d'], '5m':['5m','5d'], '15m':['15m','5d'],
  '1h':['1h','1mo'], '4h':['1h','3mo'],
  '1D':['1d','1y'], '1W':['1wk','5y'], '1M':['1mo','10y'],
};
async function getChartData(symbol, tf){
  const [interval, range] = TF_YAHOO[tf] || TF_YAHOO['1D'];
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=${interval}&range=${range}`;
  const data = await yahooFetchJson(url);
  const r = data?.chart?.result?.[0];
  if (!r) return [];
  const ts = r.timestamp || [];
  const o = r.indicators?.quote?.[0] || {};
  const out = [];
  for (let i=0;i<ts.length;i++){
    const c = o.close?.[i];
    if (!isFinite(c) || c == null) continue;
    out.push({
      t: ts[i]*1000,
      o: o.open?.[i]  ?? c,
      h: o.high?.[i]  ?? c,
      l: o.low?.[i]   ?? c,
      c,
      v: o.volume?.[i] ?? 0,
    });
  }
  return out;
}

// =====================================================================
//  INDEX STRIP — small live tape across the top
// =====================================================================
async function paintIndexStrip(){
  const tk = ++indexStripToken;
  const wrap = document.getElementById('ixStrip');
  if (!wrap.children.length){
    wrap.innerHTML = INDEX_STRIP.map(s =>
      `<div class="ix-it" data-s="${s}" onclick="${CATALOG[s] ? `selectSymbol('${s}')` : ''}" style="${CATALOG[s] ? 'cursor:pointer;':''}">
        <span class="ix-n">${esc(INDEX_LABELS[s] || s)}</span>
        <span class="ix-p" id="ix_${s.replace(/[^A-Z0-9]/g,'')}">—</span>
        <span class="ix-c" id="ixc_${s.replace(/[^A-Z0-9]/g,'')}">—</span>
      </div>`).join('');
  }
  // Two-track strategy: try the edge-function batch first (fast, single
  // request) and fill any blanks via Yahoo direct so index symbols always
  // show a price even when the proxy is missing.
  let q = {};
  try {
    if (window.TArenaDatafeed?.fetchQuotes) q = await window.TArenaDatafeed.fetchQuotes(INDEX_STRIP) || {};
  } catch(_){}
  await Promise.all(INDEX_STRIP.map(async (s) => {
    let v = q[s];
    if (!v || !(v.price > 0)) {
      // Crypto uses Binance via TArenaDatafeed; only use Yahoo for
      // index symbols and equities.
      if (s !== 'BTC' && s !== 'ETH') v = await getLivePrice(s);
    }
    if (tk !== indexStripToken) return; // a newer run is in flight
    const idP = 'ix_' + s.replace(/[^A-Z0-9]/g,'');
    const idC = 'ixc_' + s.replace(/[^A-Z0-9]/g,'');
    const elP = document.getElementById(idP), elC = document.getElementById(idC);
    if (!v || !(v.price > 0)) return;
    if (elP) elP.textContent = fmtNum(v.price);
    if (elC) {
      const pct = v.changePct ?? 0;
      elC.textContent = fmtPct(pct);
      elC.className = 'ix-c ' + (pct >= 0 ? 'up' : 'dn');
    }
  }));
}

// =====================================================================
//  LIVE PRICE REFRESH — header sync every 15s for non-crypto symbols
// ---------------------------------------------------------------------
// Crypto symbols already get sub-second updates via the Binance WebSocket
// in TArenaDatafeed.subscribeQuote, so this poll only fires for equities
// and indices where the WS doesn't apply.
// =====================================================================
// Monotonic token guards against overlapping 15s polls landing out of
// order — only the latest call is allowed to mutate the header.
let livePriceToken = 0;
async function refreshLivePrice(){
  const sym = state.symbol;
  if (!sym) return;
  // Skip crypto — handled by WS subscription on the main chart.
  if (['BTC','ETH','SOL','XRP','ADA','DOGE','LTC','BNB'].includes(sym)) return;
  const tk = ++livePriceToken;
  const v = await getLivePrice(sym);
  if (tk !== livePriceToken || sym !== state.symbol) return;
  if (!v) return;
  state.last = v.price;
  paintLivePrice({ price: v.price, change: v.change, changePct: v.changePct });
}
// Same guard for the index strip so a slow run can't clobber a newer one.
let indexStripToken = 0;

// =====================================================================
//  CENTRALIZED MARKET DATA INTEGRATION
// =====================================================================
// Start the centralized MarketData engine to supplement the existing
// Yahoo/TArenaDatafeed pipeline. The marketDataUpdated event fires every
// 15s with fresh prices for all tracked symbols.
if (window.MarketData) {
  window.MarketData.startMarketRefresh();
}
window.addEventListener('marketDataUpdated', function(e) {
  var md = e.detail;
  if (!md) return;
  // Update index strip from centralized data
  if (md.indices) {
    var indexMap = { 'ASX200': '^AXJO', 'SP500': '^GSPC', 'NASDAQ': '^IXIC', 'DOW': '^DJI' };
    Object.keys(md.indices).forEach(function(key) {
      var idx = md.indices[key];
      if (!idx || !idx.price) return;
      var yahooSym = indexMap[key];
      if (!yahooSym) return;
      var idP = 'ix_' + yahooSym.replace(/[^A-Z0-9]/g, '');
      var idC = 'ixc_' + yahooSym.replace(/[^A-Z0-9]/g, '');
      var elP = document.getElementById(idP);
      var elC = document.getElementById(idC);
      if (elP) elP.textContent = fmtNum(idx.price);
      if (elC) {
        var pct = idx.change || 0;
        elC.textContent = fmtPct(pct);
        elC.className = 'ix-c ' + (pct >= 0 ? 'up' : 'dn');
      }
    });
  }
  // Update crypto in index strip from centralized data
  if (md.crypto) {
    ['BTC', 'ETH'].forEach(function(sym) {
      var c = md.crypto[sym];
      if (!c || !c.price) return;
      var idP = 'ix_' + sym;
      var idC = 'ixc_' + sym;
      var elP = document.getElementById(idP);
      var elC = document.getElementById(idC);
      if (elP) elP.textContent = fmtNum(c.price);
      if (elC) {
        var pct = c.change || 0;
        elC.textContent = fmtPct(pct);
        elC.className = 'ix-c ' + (pct >= 0 ? 'up' : 'dn');
      }
    });
  }
  // Update stocks in index strip from centralized data
  if (md.stocks) {
    ['AAPL', 'TSLA'].forEach(function(sym) {
      var s = md.stocks[sym];
      if (!s || !s.price) return;
      var idP = 'ix_' + sym;
      var idC = 'ixc_' + sym;
      var elP = document.getElementById(idP);
      var elC = document.getElementById(idC);
      if (elP) elP.textContent = fmtNum(s.price);
      if (elC) {
        var pct = s.change || 0;
        elC.textContent = fmtPct(pct);
        elC.className = 'ix-c ' + (pct >= 0 ? 'up' : 'dn');
      }
    });
  }
  // Refresh the active symbol header if we have centralized data for it
  var activeSym = state.symbol;
  if (activeSym) {
    var symClean = activeSym.replace('.AX', '');
    var isASX = activeSym.endsWith('.AX');
    var stockData = md.stocks && md.stocks[symClean];
    var cryptoData = md.crypto && md.crypto[activeSym];
    if (stockData && stockData.price) {
      state.last = stockData.price;
      paintLivePrice({
        price: stockData.price,
        change: stockData.changeAbs || 0,
        changePct: stockData.change || 0,
      });
    } else if (cryptoData && cryptoData.price) {
      state.last = cryptoData.price;
      paintLivePrice({
        price: cryptoData.price,
        change: cryptoData.changeAbs || 0,
        changePct: cryptoData.change || 0,
      });
    }
  }
});

// =====================================================================
//  BOOT
// =====================================================================
paintSymbolHeader();
loadBars();
paintIndexStrip();
refreshWatchlistQuotes();
paintRightRail();
setInterval(paintIndexStrip, 30_000);
setInterval(refreshWatchlistQuotes, 30_000);
// Refresh the active symbol's header price every 15s for stocks/indices.
setInterval(refreshLivePrice, 15_000);
// Re-render right rail every 15s when on a quote-driven tab so chain/depth ladders track price.
setInterval(() => { if (['chain','depth'].includes(state.rrTab)) paintRightRail(); }, 15_000);
</script>
