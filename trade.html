<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TradeArena · Markets</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&amp;family=DM+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/styles.css"/>
  <style>
    /* ----- Layout ----- */
    .trade-layout{display:grid;grid-template-columns:260px 1fr 340px;gap:16px;padding:16px;flex:1;min-height:0;}
    @media(max-width:1280px){.trade-layout{grid-template-columns:240px 1fr 320px;}}
    @media(max-width:1100px){.trade-layout{grid-template-columns:1fr;}.t-sidebar,.t-orderpanel{display:none;}}

    /* ----- Search header bar ----- */
    .t-topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:14px;}
    .t-search{flex:1;max-width:460px;position:relative;}
    .t-search input{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:10px 14px 10px 38px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
    .t-search input:focus{border-color:var(--gold);}
    .t-search i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}
    .t-search .results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--navy3);border:1px solid var(--border);border-radius:10px;max-height:340px;overflow-y:auto;z-index:50;display:none;box-shadow:0 12px 36px rgba(0,0,0,.4);}
    .t-search .results.open{display:block;}
    .t-search .res{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdl);}
    .t-search .res:hover{background:rgba(201,160,48,.06);}
    .t-search .res:last-child{border-bottom:none;}
    .t-search .res .l{font-weight:700;font-size:13px;color:var(--cream);}
    .t-search .res .n{font-size:11px;color:var(--muted);margin-top:2px;}
    .t-search .res .p{font-size:13px;font-weight:600;font-feature-settings:'tnum';}

    .t-mkts{display:flex;gap:6px;}
    .t-mkt{padding:7px 14px;background:var(--navy3);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;border-radius:9999px;cursor:pointer;}
    .t-mkt.on{background:rgba(201,160,48,.12);border-color:var(--gold);color:var(--gold2);}

    /* ----- Sidebar (watchlist) ----- */
    .t-sidebar{background:var(--navy2);border:1px solid var(--border);border-radius:14px;padding:16px;height:fit-content;position:sticky;top:88px;max-height:calc(100vh - 100px);overflow-y:auto;}
    .t-sb-title{font-family:'DM Sans',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:700;margin-bottom:12px;padding:0 6px;}
    .t-sb-row{padding:10px;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border:1px solid transparent;transition:all .15s;}
    .t-sb-row:hover{background:var(--navy3);}
    .t-sb-row.active{background:rgba(201,160,48,.08);border-color:rgba(201,160,48,.3);}
    .t-sb-row .l{font-size:12.5px;font-weight:600;color:var(--cream);}
    .t-sb-row .n{font-size:10.5px;color:var(--muted);margin-top:2px;}
    .t-sb-row .p{font-size:12.5px;font-weight:600;font-feature-settings:'tnum';text-align:right;}
    .t-sb-row .c{font-size:10.5px;font-weight:600;margin-top:2px;}

    /* ----- Center: symbol header + chart ----- */
    .t-main{display:flex;flex-direction:column;gap:14px;min-width:0;}
    .t-sym-card{background:var(--navy2);border:1px solid var(--border);border-radius:14px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:18px;}
    .t-sym-left{display:flex;align-items:center;gap:14px;}
    .t-sym-icn{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:700;color:#fff;font-size:13px;}
    .t-sym-icn.asx{background:linear-gradient(135deg,#065f46,#10b981);}
    .t-sym-icn.us{background:linear-gradient(135deg,#1e40af,#3b82f6);}
    .t-sym-icn.crypto{background:linear-gradient(135deg,#92400e,#f59e0b);}
    .t-sym-info .s{font-family:'DM Sans',sans-serif;font-size:1.3rem;font-weight:700;color:var(--cream);letter-spacing:.02em;}
    .t-sym-info .n{font-size:12.5px;color:var(--muted);margin-top:2px;}
    .t-sym-price{text-align:right;font-feature-settings:'tnum';}
    .t-sym-price .px{font-family:'DM Sans',sans-serif;font-size:1.8rem;font-weight:700;color:var(--cream);line-height:1;}
    .t-sym-price .ch{font-size:13.5px;font-weight:600;margin-top:4px;}
    .t-sym-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-left:24px;}
    @media(max-width:900px){.t-sym-stats{grid-template-columns:repeat(2,1fr);width:100%;margin-left:0;}}
    .t-sym-stats .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin-bottom:3px;}
    .t-sym-stats .val{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--cream);font-feature-settings:'tnum';}

    .t-chart{background:var(--navy2);border:1px solid var(--border);border-radius:14px;overflow:hidden;height:560px;}

    /* ----- Right: order entry panel ----- */
    .t-orderpanel{display:flex;flex-direction:column;gap:14px;min-width:0;}
    .t-card{background:var(--navy2);border:1px solid var(--border);border-radius:14px;padding:16px;}
    .t-card h3{font-family:'DM Sans',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}

    .bs-tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:14px;}
    .bs-tab{padding:9px;text-align:center;background:transparent;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-radius:8px;letter-spacing:.04em;transition:all .15s;}
    .bs-tab.buy.on{background:linear-gradient(135deg,#065f46,#10b981);color:#fff;box-shadow:0 4px 14px -4px rgba(16,185,129,.5);}
    .bs-tab.sell.on{background:linear-gradient(135deg,#7f1d1d,#dc2626);color:#fff;box-shadow:0 4px 14px -4px rgba(220,38,38,.5);}

    .ord-field{margin-bottom:12px;}
    .ord-lbl{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between;}
    .ord-lbl span:last-child{color:var(--cream);font-weight:500;}
    .ord-input{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:11px 12px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;outline:none;font-feature-settings:'tnum';}
    .ord-input:focus{border-color:var(--gold);}

    .type-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
    .type-btn{padding:8px;background:var(--navy3);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
    .type-btn.on{border-color:var(--gold);color:var(--gold2);background:rgba(201,160,48,.08);}

    .qty-quick{display:flex;gap:5px;margin-top:6px;}
    .qty-q{flex:1;padding:5px;background:var(--navy3);border:1px solid var(--bdl);border-radius:5px;color:var(--muted);font-size:10.5px;font-weight:600;cursor:pointer;}
    .qty-q:hover{color:var(--gold2);border-color:var(--gold);}

    .ord-summary{background:var(--navy3);border:1px solid var(--bdl);border-radius:8px;padding:11px 12px;margin:10px 0 14px;font-size:12px;}
    .ord-summary .row{display:flex;justify-content:space-between;padding:3px 0;}
    .ord-summary .row.total{font-weight:700;color:var(--cream);font-size:14px;border-top:1px solid var(--bdl);margin-top:6px;padding-top:8px;}
    .ord-summary .row span:last-child{font-feature-settings:'tnum';}

    .ord-submit{width:100%;padding:13px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;cursor:pointer;text-transform:uppercase;}
    .ord-submit.buy{background:linear-gradient(135deg,#065f46,#10b981);color:#fff;}
    .ord-submit.sell{background:linear-gradient(135deg,#7f1d1d,#dc2626);color:#fff;}

    /* ----- Order book ----- */
    .ob-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:11.5px;font-feature-settings:'tnum';padding:3px 4px;position:relative;}
    .ob-row.head{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;padding:6px 4px;border-bottom:1px solid var(--bdl);margin-bottom:4px;}
    .ob-row .px{font-weight:600;}
    .ob-row.ask .px{color:#f87171;}
    .ob-row.bid .px{color:#4ade80;}
    .ob-row .qty,.ob-row .tot{text-align:right;color:var(--cream);}
    .ob-row .bar{position:absolute;top:0;right:0;height:100%;opacity:.08;z-index:0;border-radius:4px;}
    .ob-row.ask .bar{background:#dc2626;}
    .ob-row.bid .bar{background:#10b981;}
    .ob-row > *{position:relative;z-index:1;}
    .ob-spread{display:flex;justify-content:space-between;align-items:center;padding:8px 4px;margin:6px 0;background:rgba(201,160,48,.05);border-radius:6px;font-size:11px;}
    .ob-spread .lbl{color:var(--muted);font-weight:600;}
    .ob-spread .val{font-feature-settings:'tnum';font-weight:700;color:var(--gold2);}

    /* ----- Lower tabs (Overview / Trades / News) ----- */
    .t-lower{background:var(--navy2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
    .t-lower-tabs{display:flex;border-bottom:1px solid var(--bdl);}
    .t-lower-tab{padding:14px 22px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--muted);border-bottom:2px solid transparent;background:transparent;border-top:none;border-left:none;border-right:none;transition:all .15s;}
    .t-lower-tab:hover{color:var(--cream);}
    .t-lower-tab.on{color:var(--gold2);border-bottom-color:var(--gold);}
    .t-lower-body{padding:20px 22px;}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;}
    .stat-tile{background:var(--navy3);border:1px solid var(--bdl);border-radius:10px;padding:14px;}
    .stat-tile .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin-bottom:4px;}
    .stat-tile .v{font-family:'DM Sans',sans-serif;font-size:1.05rem;font-weight:700;color:var(--cream);font-feature-settings:'tnum';}

    .trade-row{display:grid;grid-template-columns:80px 1fr 1fr 1fr;gap:12px;padding:9px 0;border-bottom:1px solid var(--bdl);font-size:12.5px;font-feature-settings:'tnum';}
    .trade-row:last-child{border-bottom:none;}
    .trade-row .t{color:var(--muted);}
    .trade-row .s{color:var(--cream);font-weight:600;}
    .trade-row .px{text-align:right;font-weight:600;}
    .trade-row .v{text-align:right;color:var(--muted);}
  </style>
</head>
<body>

<div id="tarena-nav"></div>

<!-- Top search bar -->
<div class="t-topbar">
  <div class="t-search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchBox" placeholder="Search BHP, AAPL, BTC..." autocomplete="off"/>
    <div class="results" id="searchResults"></div>
  </div>
  <div class="t-mkts" id="mktTabs">
    <button class="t-mkt on" data-m="all">All</button>
    <button class="t-mkt" data-m="asx">ASX</button>
    <button class="t-mkt" data-m="us">US</button>
    <button class="t-mkt" data-m="crypto">Crypto</button>
  </div>
</div>

<div class="trade-layout">

  <!-- LEFT: watchlist -->
  <aside class="t-sidebar">
    <div class="t-sb-title">Watchlist</div>
    <div id="watchlist"></div>
  </aside>

  <!-- CENTER -->
  <main class="t-main">

    <!-- Symbol header -->
    <div class="t-sym-card">
      <div class="t-sym-left">
        <div class="t-sym-icn" id="symIcn">--</div>
        <div class="t-sym-info">
          <div class="s" id="symName">—</div>
          <div class="n" id="symFull">—</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap;">
        <div class="t-sym-price">
          <div class="px" id="symPx">$0.00</div>
          <div class="ch" id="symCh">+0.00%</div>
        </div>
        <div class="t-sym-stats">
          <div><div class="lbl">Day high</div><div class="val" id="symHi">—</div></div>
          <div><div class="lbl">Day low</div><div class="val" id="symLo">—</div></div>
          <div><div class="lbl">52w high</div><div class="val" id="sym52h">—</div></div>
          <div><div class="lbl">Volume</div><div class="val" id="symVol">—</div></div>
        </div>
      </div>
    </div>

    <!-- Chart container — populated by TArenaChart.mount() -->
    <div class="t-chart" id="tv_chart_container"></div>

    <!-- Lower tabs -->
    <div class="t-lower">
      <div class="t-lower-tabs">
        <button class="t-lower-tab on" data-t="overview">Overview</button>
        <button class="t-lower-tab" data-t="trades">Recent trades</button>
        <button class="t-lower-tab" data-t="orders">My orders</button>
      </div>
      <div class="t-lower-body" id="lowerBody"></div>
    </div>

  </main>

  <!-- RIGHT: order panel + book -->
  <aside class="t-orderpanel">

    <div class="t-card">
      <h3>Place order <span style="color:var(--gold2);font-weight:700;text-transform:none;letter-spacing:.04em;font-size:11px;" id="ordSym">—</span></h3>

      <div class="bs-tabs">
        <button class="bs-tab buy on" id="bsBuy" onclick="setSide('buy')">Buy</button>
        <button class="bs-tab sell" id="bsSell" onclick="setSide('sell')">Sell</button>
      </div>

      <div class="type-row">
        <button class="type-btn on" id="tyMkt" onclick="setType('market')">Market</button>
        <button class="type-btn" id="tyLmt" onclick="setType('limit')">Limit</button>
      </div>

      <div class="ord-field">
        <div class="ord-lbl"><span>Quantity</span><span id="qtyHint">~</span></div>
        <input type="number" class="ord-input" id="ordQty" value="10" min="0" step="1" oninput="updateTotal()"/>
        <div class="qty-quick">
          <button class="qty-q" onclick="setQtyPct(0.25)">25%</button>
          <button class="qty-q" onclick="setQtyPct(0.5)">50%</button>
          <button class="qty-q" onclick="setQtyPct(0.75)">75%</button>
          <button class="qty-q" onclick="setQtyPct(1)">Max</button>
        </div>
      </div>

      <div class="ord-field" id="limitField" style="display:none;">
        <div class="ord-lbl"><span>Limit price</span></div>
        <input type="number" class="ord-input" id="ordLimit" step="0.01" oninput="updateTotal()"/>
      </div>

      <div class="ord-summary">
        <div class="row"><span>Est. price</span><span id="sumPx">$0.00</span></div>
        <div class="row"><span>Quantity</span><span id="sumQty">0</span></div>
        <div class="row"><span>Brokerage</span><span class="text-green">$0.00</span></div>
        <div class="row total"><span>Total</span><span id="sumTotal">$0.00</span></div>
      </div>

      <button class="ord-submit buy" id="submitBtn" onclick="placeOrder()">Buy at market</button>
    </div>

    <!-- Order book -->
    <div class="t-card">
      <h3>Order book <span style="font-weight:500;color:var(--muted);text-transform:none;letter-spacing:0;">simulated</span></h3>
      <div class="ob-row head"><span>Price</span><span class="qty">Qty</span><span class="tot">Total</span></div>
      <div id="orderBook"></div>
    </div>

  </aside>

</div>

<div id="tarena-footer"></div>

<script src="assets/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="assets/supabase.js"></script>
<script src="assets/app.js"></script>
<script src="assets/market.js"></script>
<script src="assets/datafeed.js"></script>
<script src="assets/chart-bootstrap.js"></script>
<script>
  const session = TArenaAuth.requireAuth();
  if (!session) throw new Error('redirect');
  TArenaUI.renderNav('trade');
  TArenaUI.renderFooter();

  let activeMkt = 'all';
  let currentSymbol = 'BHP.AX';
  let side = 'buy';
  let orderType = 'market';
  let chartCtl = null;          // controller returned by TArenaChart.mount()
  const CASH = 25000;
  // Map of symbol → unsubscribe function for the live quote feed.
  const liveSubs = {};

  function currentMarket() {
    const m = TArenaMarket.find(currentSymbol);
    return m;
  }

  // One-shot quote refresh that mutates the existing runtime record
  // for `sym`. Used after a placeholder is inserted so the header
  // shows a real price immediately rather than waiting for the live
  // subscription to tick.
  async function refreshRuntimeQuote(sym) {
    const rec = TArenaMarket.find(sym);
    if (!rec) return;
    try {
      const quotes = await TArenaDatafeed.fetchQuotes([sym]);
      const q = quotes[sym];
      if (q) {
        if (typeof q.price === 'number')      rec.price  = q.price;
        if (typeof q.changePct === 'number')  rec.change = q.changePct;
        if (rec.high52 === 0) rec.high52 = rec.price;
        if (rec.low52  === 0) rec.low52  = rec.price;
      }
    } catch (e) {
      console.warn('quote hydrate failed', sym, e.message);
    }
  }

  function renderSymbolHeader() {
    const m = currentMarket();
    if (!m) return;
    document.getElementById('symIcn').textContent = m.symbol.replace('.AX', '').slice(0, 3);
    document.getElementById('symIcn').className = 't-sym-icn ' + m.market;
    document.getElementById('symName').textContent = m.symbol.replace('.AX', '');
    document.getElementById('symFull').textContent = `${m.name} · ${m.market === 'asx' ? 'ASX' : m.market === 'us' ? 'NASDAQ/NYSE' : 'Crypto'}`;
    document.getElementById('symPx').textContent = '$' + (m.price < 100 ? m.price.toFixed(2) : m.price.toLocaleString('en-US', { maximumFractionDigits: 2 }));
    const up = m.change >= 0;
    document.getElementById('symCh').textContent = (up ? '▲ ' : '▼ ') + TArenaUI.fmtPct(m.change) + '  today';
    document.getElementById('symCh').className = 'ch ' + (up ? 'text-green' : 'text-red');
    document.getElementById('symHi').textContent = '$' + (m.price * 1.012).toFixed(2);
    document.getElementById('symLo').textContent = '$' + (m.price * 0.988).toFixed(2);
    document.getElementById('sym52h').textContent = '$' + m.high52.toLocaleString();
    document.getElementById('symVol').textContent = m.vol;
    document.getElementById('ordSym').textContent = m.symbol.replace('.AX', '');
    updateTotal();
    renderOrderBook();
  }

  // Mount the chart once. Subsequent symbol selections call
  // chartCtl.setSymbol() instead of re-mounting. We also re-apply the
  // current symbol after mount resolves so that any symbol switches
  // that happened while the library was loading aren't lost.
  async function ensureChart() {
    if (chartCtl) return chartCtl;
    chartCtl = await TArenaChart.mount('tv_chart_container', currentSymbol, '60');
    try { chartCtl.setSymbol(currentSymbol); } catch (_) {}
    return chartCtl;
  }

  // ----- Live quote subscription helpers -----
  // Apply a tick to the in-memory market record so other renders
  // (header, watchlist, order panel summary, order book) all see
  // the same price.
  function applyTick(symbol, tick) {
    const m = TArenaMarket.find(symbol);
    if (!m) return;
    m.price = tick.price;
    // Always honour a numeric changePct, including a legitimate 0.00%
    // (otherwise the header sticks at the last non-zero value).
    if (typeof tick.changePct === 'number' && isFinite(tick.changePct)) m.change = tick.changePct;
    if (symbol === currentSymbol) {
      renderSymbolHeader();
      renderOrderBook();
      updateTotal();
    }
    // Update just this row in the watchlist (cheaper than a full re-render).
    const row = document.querySelector(`.t-sb-row[data-sym="${symbol}"]`);
    if (row) {
      const up = m.change >= 0;
      row.querySelector('.p').textContent = '$' + (m.price < 100 ? m.price.toFixed(2) : m.price.toLocaleString());
      const c = row.querySelector('.c');
      c.textContent = TArenaUI.fmtPct(m.change);
      c.className = 'c ' + (up ? 'text-green' : 'text-red');
    }
  }

  function ensureLive(symbol) {
    if (liveSubs[symbol]) return;
    liveSubs[symbol] = TArenaDatafeed.subscribeQuote(symbol, (tick) => applyTick(symbol, tick));
  }

  function dropLive(symbol) {
    if (liveSubs[symbol]) { try { liveSubs[symbol](); } catch (_) {} delete liveSubs[symbol]; }
  }

  // Subscribe to all watchlist symbols + the current symbol;
  // drop subscriptions for anything no longer needed.
  function syncLiveSubs() {
    const wanted = new Set([currentSymbol, ...TArenaMarket.getWatchlist()]);
    for (const s of wanted) ensureLive(s);
    for (const s of Object.keys(liveSubs)) if (!wanted.has(s)) dropLive(s);
  }

  function renderWatchlist() {
    const wl = TArenaMarket.getWatchlist();
    const html = wl.map(sym => {
      const m = TArenaMarket.find(sym);
      if (!m) return '';
      const up = m.change >= 0;
      const active = sym === currentSymbol ? 'active' : '';
      return `<div class="t-sb-row ${active}" data-sym="${sym}" onclick="selectSymbol('${sym}')">
        <div>
          <div class="l">${sym.replace('.AX','')}</div>
          <div class="n">${m.name}</div>
        </div>
        <div>
          <div class="p">$${m.price < 100 ? m.price.toFixed(2) : m.price.toLocaleString()}</div>
          <div class="c ${up ? 'text-green' : 'text-red'}">${TArenaUI.fmtPct(m.change)}</div>
        </div>
      </div>`;
    }).join('');
    document.getElementById('watchlist').innerHTML = html;
  }

  // selectSymbol handles both catalogue symbols and remote-search
  // symbols. For unknown symbols it hydrates a runtime record first so
  // header / order panel / watchlist all stay coherent with the chart.
  async function selectSymbol(sym, meta) {
    currentSymbol = sym;
    if (!TArenaMarket.find(sym)) {
      // Optimistic placeholder so the UI doesn't flash empty while we
      // wait for the quote to come back.
      const placeholder = {
        symbol: sym,
        name:   (meta && (meta.description || meta.name)) || sym,
        market: TArenaDatafeed.classify(sym) === 'crypto' ? 'crypto'
              : TArenaDatafeed.classify(sym) === 'asx'    ? 'asx' : 'us',
        price:  0, change: 0, mcap: '—', vol: '—',
        high52: 0, low52: 0, tv: sym,
      };
      TArenaMarket.data.push(placeholder);
      // Refresh the placeholder with a real quote in the background;
      // re-render once we have a price (live subs will keep it fresh
      // afterwards).
      refreshRuntimeQuote(sym).then(() => {
        if (currentSymbol === sym) renderSymbolHeader();
      });
    }
    renderSymbolHeader();
    renderWatchlist();
    renderLower();
    syncLiveSubs();
    if (chartCtl) chartCtl.setSymbol(sym);
  }
  window.selectSymbol = selectSymbol;

  // ----- Search (debounced; uses TArenaDatafeed.search → data-proxy) -----
  const searchBox = document.getElementById('searchBox');
  const searchResults = document.getElementById('searchResults');
  let searchTimer = null;
  let searchSeq   = 0;
  // Defense-in-depth: escape HTML before splicing untrusted upstream
  // search-result fields into innerHTML.
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function renderSearchResults(rows) {
    if (!rows.length) {
      searchResults.innerHTML = '<div class="res"><div><div class="l">No matches</div></div></div>';
    } else {
      searchResults.innerHTML = rows.slice(0, 8).map((r, i) => {
        const sym  = esc(r.symbol);
        const desc = esc(r.description || r.name || '');
        const exch = esc((r.exchange || r.market || '').toUpperCase());
        return `<div class="res" data-sym="${sym}" data-idx="${i}">
          <div><div class="l">${sym.replace('.AX','')}</div><div class="n">${desc}${exch ? ' · ' + exch : ''}</div></div>
        </div>`;
      }).join('');
      searchResults.querySelectorAll('.res[data-sym]').forEach(el => {
        el.addEventListener('click', () => {
          const meta = rows[+el.dataset.idx] || null;
          selectSymbol(el.dataset.sym, meta);
          searchBox.value = '';
          searchResults.classList.remove('open');
        });
      });
    }
    searchResults.classList.add('open');
  }
  searchBox.addEventListener('input', () => {
    const q = searchBox.value.trim();
    clearTimeout(searchTimer);
    if (!q) { searchResults.classList.remove('open'); return; }
    const seq = ++searchSeq;
    searchTimer = setTimeout(async () => {
      try {
        // Real-data search via the edge function. Fall back to the
        // local TArenaMarket catalogue if the proxy isn't deployed yet
        // so the page never looks broken in dev.
        let rows = await global_TArenaDatafeed_search(q, activeMkt === 'all' ? '' : activeMkt);
        if (seq !== searchSeq) return; // a newer keystroke superseded us
        if (!rows.length) {
          rows = TArenaMarket.data
            .filter(d => d.symbol.toLowerCase().includes(q.toLowerCase())
                      || d.name.toLowerCase().includes(q.toLowerCase()))
            .filter(d => activeMkt === 'all' || d.market === activeMkt)
            .map(d => ({ symbol: d.symbol, description: d.name, exchange: d.market }));
        }
        renderSearchResults(rows);
      } catch (_) {
        // Proxy unreachable → use the local catalogue.
        const ql = q.toLowerCase();
        const rows = TArenaMarket.data
          .filter(d => d.symbol.toLowerCase().includes(ql) || d.name.toLowerCase().includes(ql))
          .filter(d => activeMkt === 'all' || d.market === activeMkt)
          .map(d => ({ symbol: d.symbol, description: d.name, exchange: d.market }));
        if (seq === searchSeq) renderSearchResults(rows);
      }
    }, 220);
  });
  // Tiny shim so the inline async caller above stays readable.
  function global_TArenaDatafeed_search(q, market) {
    return (window.TArenaDatafeed && window.TArenaDatafeed.search)
      ? window.TArenaDatafeed.search(q, market)
      : Promise.resolve([]);
  }
  document.addEventListener('click', e => {
    if (!searchBox.contains(e.target) && !searchResults.contains(e.target)) searchResults.classList.remove('open');
  });
  document.getElementById('mktTabs').addEventListener('click', e => {
    if (!e.target.dataset.m) return;
    activeMkt = e.target.dataset.m;
    document.querySelectorAll('.t-mkt').forEach(b => b.classList.toggle('on', b === e.target));
  });

  // ----- Order entry -----
  function setSide(s) {
    side = s;
    document.getElementById('bsBuy').classList.toggle('on', s === 'buy');
    document.getElementById('bsSell').classList.toggle('on', s === 'sell');
    const btn = document.getElementById('submitBtn');
    btn.classList.toggle('buy', s === 'buy');
    btn.classList.toggle('sell', s === 'sell');
    updateTotal();
  }
  function setType(t) {
    orderType = t;
    document.getElementById('tyMkt').classList.toggle('on', t === 'market');
    document.getElementById('tyLmt').classList.toggle('on', t === 'limit');
    document.getElementById('limitField').style.display = t === 'limit' ? 'block' : 'none';
    if (t === 'limit') {
      const m = currentMarket();
      if (m) document.getElementById('ordLimit').value = m.price.toFixed(2);
    }
    updateTotal();
  }
  function setQtyPct(pct) {
    const m = currentMarket();
    if (!m) return;
    if (side === 'buy') {
      const max = Math.floor((CASH * pct) / m.price);
      document.getElementById('ordQty').value = max;
    } else {
      const h = TArenaMarket.holdings.find(x => x.symbol === currentSymbol);
      const owned = h ? h.qty : 0;
      document.getElementById('ordQty').value = (owned * pct).toFixed(owned < 1 ? 4 : 0);
    }
    updateTotal();
  }
  window.setSide = setSide; window.setType = setType; window.setQtyPct = setQtyPct;

  function updateTotal() {
    const m = currentMarket();
    if (!m) return;
    const qty = parseFloat(document.getElementById('ordQty').value) || 0;
    const px = orderType === 'limit' ? (parseFloat(document.getElementById('ordLimit').value) || m.price) : m.price;
    const total = qty * px;
    document.getElementById('sumPx').textContent  = '$' + px.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    document.getElementById('sumQty').textContent = qty.toLocaleString();
    document.getElementById('sumTotal').textContent = '$' + total.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    const sym = m.symbol.replace('.AX','');
    document.getElementById('submitBtn').textContent = `${side === 'buy' ? 'Buy' : 'Sell'} ${sym} ${orderType === 'market' ? 'at market' : 'at limit'}`;
    document.getElementById('qtyHint').textContent = side === 'buy' ? `Cash: $${CASH.toLocaleString()}` : (() => {
      const h = TArenaMarket.holdings.find(x => x.symbol === currentSymbol);
      return `Owned: ${h ? h.qty : 0}`;
    })();
  }
  window.updateTotal = updateTotal;

  function placeOrder() {
    const m = currentMarket();
    const qty = parseFloat(document.getElementById('ordQty').value) || 0;
    if (qty <= 0) return alert('Enter a valid quantity.');
    const px = orderType === 'limit' ? (parseFloat(document.getElementById('ordLimit').value) || m.price) : m.price;
    TArenaMarket.placeOrder({ symbol: m.symbol, side, qty, price: px, type: orderType, status: orderType === 'market' ? 'filled' : 'open' });
    const btn = document.getElementById('submitBtn');
    const orig = btn.textContent;
    btn.textContent = '✓ Order placed';
    btn.style.opacity = '0.7';
    setTimeout(() => { btn.textContent = orig; btn.style.opacity = '1'; renderLower(); }, 1500);
  }
  window.placeOrder = placeOrder;

  // ----- Order book (simulated) -----
  function renderOrderBook() {
    const m = currentMarket();
    if (!m) return;
    const px = m.price;
    const tickSize = px > 1000 ? 1 : px > 100 ? 0.05 : 0.01;
    const asks = []; const bids = [];
    let runAsk = 0; let runBid = 0;
    for (let i = 5; i >= 1; i--) {
      const p = +(px + tickSize * i).toFixed(2);
      const q = Math.floor(200 + Math.random() * 1800);
      runAsk += q;
      asks.push({ p, q, run: runAsk });
    }
    for (let i = 1; i <= 5; i++) {
      const p = +(px - tickSize * i).toFixed(2);
      const q = Math.floor(200 + Math.random() * 1800);
      runBid += q;
      bids.push({ p, q, run: runBid });
    }
    const maxRun = Math.max(asks[0].run, bids[bids.length-1].run);
    const askHtml = asks.map(a => `<div class="ob-row ask"><div class="bar" style="width:${(a.run/maxRun)*100}%;"></div><span class="px">$${a.p}</span><span class="qty">${a.q.toLocaleString()}</span><span class="tot">${a.run.toLocaleString()}</span></div>`).join('');
    const bidHtml = bids.map(b => `<div class="ob-row bid"><div class="bar" style="width:${(b.run/maxRun)*100}%;"></div><span class="px">$${b.p}</span><span class="qty">${b.q.toLocaleString()}</span><span class="tot">${b.run.toLocaleString()}</span></div>`).join('');
    const spread = asks[asks.length-1].p - bids[0].p;
    const spreadPct = (spread / px) * 100;
    document.getElementById('orderBook').innerHTML =
      askHtml +
      `<div class="ob-spread"><span class="lbl">Spread</span><span class="val">$${spread.toFixed(2)} · ${spreadPct.toFixed(3)}%</span></div>` +
      bidHtml;
  }

  // ----- Lower tabs -----
  let lowerTab = 'overview';
  document.querySelector('.t-lower-tabs').addEventListener('click', e => {
    if (!e.target.dataset.t) return;
    lowerTab = e.target.dataset.t;
    document.querySelectorAll('.t-lower-tab').forEach(b => b.classList.toggle('on', b === e.target));
    renderLower();
  });
  function renderLower() {
    const m = currentMarket();
    if (!m) return;
    const body = document.getElementById('lowerBody');
    if (lowerTab === 'overview') {
      body.innerHTML = `<div class="stat-grid">
        <div class="stat-tile"><div class="l">Open</div><div class="v">$${(m.price * 0.997).toFixed(2)}</div></div>
        <div class="stat-tile"><div class="l">Prev. close</div><div class="v">$${(m.price * (1 - m.change/100)).toFixed(2)}</div></div>
        <div class="stat-tile"><div class="l">Day range</div><div class="v">$${(m.price*0.988).toFixed(2)} – $${(m.price*1.012).toFixed(2)}</div></div>
        <div class="stat-tile"><div class="l">52w range</div><div class="v">$${m.low52.toLocaleString()} – $${m.high52.toLocaleString()}</div></div>
        <div class="stat-tile"><div class="l">Volume</div><div class="v">${m.vol}</div></div>
        <div class="stat-tile"><div class="l">Market cap</div><div class="v">${m.mcap}</div></div>
      </div>`;
    } else if (lowerTab === 'trades') {
      const rows = [];
      let p = m.price;
      for (let i = 0; i < 12; i++) {
        const dir = Math.random() > 0.5 ? 1 : -1;
        p = +(p + dir * (Math.random() * (m.price * 0.001))).toFixed(2);
        rows.push({ t: new Date(Date.now() - i * 1000 * (3 + Math.random()*30)), s: dir > 0 ? 'B' : 'S', p, q: Math.floor(50 + Math.random() * 1000) });
      }
      body.innerHTML = '<div class="trade-row" style="border-bottom:1px solid var(--bdl);font-size:10.5px;text-transform:uppercase;color:var(--muted);font-weight:700;letter-spacing:.08em;"><span>Time</span><span>Side</span><span class="px">Price</span><span class="v">Qty</span></div>' +
        rows.map(r => `<div class="trade-row">
          <span class="t">${r.t.toLocaleTimeString('en-AU',{hour12:false})}</span>
          <span class="s ${r.s==='B'?'text-green':'text-red'}">${r.s==='B'?'Buy':'Sell'}</span>
          <span class="px">$${r.p}</span>
          <span class="v">${r.q.toLocaleString()}</span>
        </div>`).join('');
    } else if (lowerTab === 'orders') {
      const orders = TArenaMarket.getOrders();
      if (!orders.length) { body.innerHTML = '<div class="text-muted" style="text-align:center;padding:30px;">No orders yet. Place your first order on the right →</div>'; return; }
      body.innerHTML = '<div class="trade-row" style="grid-template-columns:80px 1fr 1fr 1fr 80px;border-bottom:1px solid var(--bdl);font-size:10.5px;text-transform:uppercase;color:var(--muted);font-weight:700;letter-spacing:.08em;"><span>Time</span><span>Symbol</span><span>Side</span><span class="px">Price</span><span class="v">Qty</span></div>' +
        orders.map(o => `<div class="trade-row" style="grid-template-columns:80px 1fr 1fr 1fr 80px;">
          <span class="t">${new Date(o.ts).toLocaleTimeString('en-AU',{hour12:false})}</span>
          <span class="s">${o.symbol.replace('.AX','')}</span>
          <span class="s ${o.side==='buy'?'text-green':'text-red'}">${o.side.toUpperCase()}</span>
          <span class="px">$${o.price}</span>
          <span class="v">${o.qty}</span>
        </div>`).join('');
    }
  }

  // Initial render — mount chart + start live subscriptions.
  renderSymbolHeader();
  renderWatchlist();
  renderLower();
  syncLiveSubs();
  ensureChart().catch(e => {
    console.error('chart mount failed', e);
    document.getElementById('tv_chart_container').innerHTML =
      `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#a8c1db;font-family:'DM Sans',sans-serif;text-align:center;padding:32px;">
        <div>
          <div style="font-size:32px;margin-bottom:12px;opacity:.6;">⚠️</div>
          <div style="font-weight:700;color:#fff;">Chart failed to load</div>
          <div style="font-size:12px;opacity:.7;margin-top:6px;">${e.message}</div>
        </div>
      </div>`;
  });

  // Clean up subscriptions on page unload so we don't leak WS connections.
  window.addEventListener('beforeunload', () => {
    Object.keys(liveSubs).forEach(dropLive);
    if (chartCtl) chartCtl.destroy();
  });

  console.log('%cTradeArena · Markets ready.', 'color:#e8c060;font-weight:700;');
</script>
</body>
</html>
