<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TradeArena · Admin</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&amp;family=Cinzel+Decorative:wght@700&amp;family=DM+Sans:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/styles.css"/>
  <style>
    .admin-header{padding:32px 5% 18px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:18px;}
    .admin-header h1{font-family:'Cinzel',serif;font-size:2.4rem;letter-spacing:-1px;}
    .admin-header p{color:var(--muted);margin-top:4px;font-size:14px;}
    .admin-body{padding:0 5% 60px;display:flex;flex-direction:column;gap:24px;flex:1;}

    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;}
    .stat-tile{background:var(--navy3);border:1px solid var(--border);border-radius:18px;padding:22px;}
    .stat-tile .icon{width:42px;height:42px;border-radius:12px;background:rgba(201,160,48,.12);color:var(--gold2);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px;}
    .stat-tile .lbl{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
    .stat-tile .val{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:700;}
    .stat-tile .sub{color:var(--muted);font-size:12.5px;margin-top:6px;}

    .grid-admin{display:grid;grid-template-columns:1.6fr 1fr;gap:24px;}
    @media(max-width:1100px){.grid-admin{grid-template-columns:1fr;}}

    .uni-bar{display:flex;flex-direction:column;gap:14px;}
    .uni-row{display:flex;align-items:center;gap:14px;}
    .uni-row .name{flex:0 0 180px;font-size:13.5px;}
    .uni-row .bar{flex:1;height:10px;background:var(--navy3);border-radius:9999px;overflow:hidden;border:1px solid var(--bdl);}
    .uni-row .bar > div{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:9999px;transition:width .6s;}
    .uni-row .count{flex:0 0 60px;text-align:right;font-family:'Cinzel',serif;color:var(--gold2);font-size:13px;}

    .actions{display:flex;gap:10px;flex-wrap:wrap;}
    .empty{text-align:center;padding:48px 18px;color:var(--muted);}
    .empty i{font-size:36px;color:var(--gold);opacity:.4;margin-bottom:14px;display:block;}

    .gate{position:fixed;inset:0;background:rgba(6,14,28,.95);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(6px);}
    .gate .gate-card{max-width:420px;width:90%;background:var(--navy2);border:1px solid var(--border);border-radius:20px;padding:34px;text-align:center;}
    .gate.hide{display:none;}
    .gate-card h2{font-family:'Cinzel',serif;font-size:1.4rem;margin-bottom:8px;}
    .gate-card p{color:var(--muted);font-size:13.5px;line-height:1.6;margin-bottom:16px;}
  </style>
</head>
<body>

<!-- Admin gate (shown until we confirm the signed-in user has profiles.is_admin = true) -->
<div class="gate" id="gate">
  <div class="gate-card">
    <h2 id="gateTitle">Checking access…</h2>
    <p id="gateMsg">Verifying your account…</p>
    <div id="gateActions" style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;"></div>
  </div>
</div>

<div id="tarena-nav"></div>

<div class="admin-header">
  <div>
    <h1>Admin · Control Panel</h1>
    <p>Manage members, monitor activity.</p>
  </div>
  <div class="actions">
    <button class="btn-ghost" onclick="reload()"><i class="fa-solid fa-rotate"></i> Refresh</button>
    <button class="btn-ghost" onclick="exportRegs()"><i class="fa-solid fa-download"></i> Export CSV</button>
  </div>
</div>

<div class="admin-body">

  <!-- Stat tiles -->
  <div class="stat-grid">
    <div class="stat-tile">
      <div class="icon"><i class="fa-solid fa-users"></i></div>
      <div class="lbl">Total Members</div>
      <div class="val" id="statTotal">0</div>
      <div class="sub" id="statTotalSub">All time</div>
    </div>
    <div class="stat-tile">
      <div class="icon"><i class="fa-solid fa-graduation-cap"></i></div>
      <div class="lbl">Students</div>
      <div class="val text-gold" id="statStudents">0</div>
      <div class="sub">University verified</div>
    </div>
    <div class="stat-tile">
      <div class="icon"><i class="fa-solid fa-globe"></i></div>
      <div class="lbl">Public</div>
      <div class="val text-blue" id="statPublic">0</div>
      <div class="sub">Open access</div>
    </div>
    <div class="stat-tile">
      <div class="icon"><i class="fa-solid fa-clock"></i></div>
      <div class="lbl">Last 7 Days</div>
      <div class="val text-green" id="statRecent">0</div>
      <div class="sub">New sign-ups</div>
    </div>
  </div>

  <div class="grid-admin">

    <!-- Registrations table -->
    <div class="card-flat">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px;">
        <h3 style="font-family:'Cinzel',serif;font-size:1.05rem;letter-spacing:.04em;">Registrations</h3>
        <input type="text" id="searchReg" placeholder="Search email, username or university…" style="background:var(--navy3);border:1px solid var(--border);border-radius:9999px;padding:8px 18px;color:var(--cream);font-size:13px;outline:none;width:300px;max-width:100%;"/>
      </div>
      <div style="overflow:auto;max-height:520px;">
        <table class="tarena" id="regTable">
          <thead>
            <tr><th>Email</th><th>Username</th><th>University</th><th>Type</th><th class="text-right">Joined</th></tr>
          </thead>
          <tbody id="regBody"></tbody>
        </table>
      </div>
    </div>

    <!-- By university -->
    <div class="card-flat">
      <div style="margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;">
        <h3 style="font-family:'Cinzel',serif;font-size:1.05rem;letter-spacing:.04em;">By University</h3>
        <span class="badge-gold badge" style="font-size:11px;">Top 10</span>
      </div>
      <div class="uni-bar" id="uniBar"></div>
    </div>

  </div>
</div>

<div id="tarena-footer"></div>

<script src="assets/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="assets/supabase.js"></script>
<script src="assets/app.js"></script>
<script>
  TArenaUI.renderNav('admin');
  TArenaUI.renderFooter();

  let allRegs = [];
  let searchTerm = '';
  document.getElementById('searchReg').addEventListener('input', e => {
    searchTerm = e.target.value.toLowerCase();
    renderRegs();
  });

  function gate(title, msg, actions) {
    document.getElementById('gateTitle').textContent = title;
    document.getElementById('gateMsg').textContent = msg;
    const wrap = document.getElementById('gateActions');
    wrap.innerHTML = (actions || []).map(a =>
      `<a href="${a.href}" class="${a.cls || 'btn-gold'}">${a.label}</a>`
    ).join('');
    document.getElementById('gate').classList.remove('hide');
  }

  async function init() {
    // Wait briefly for the session cache to hydrate from Supabase storage
    await TArenaAuth.reloadSession();
    const session = TArenaAuth.getSession();
    if (!session) {
      gate('Sign in required', 'You need to sign in with an admin account.',
           [{href: 'auth.html', label: 'Sign in →'}]);
      return;
    }
    if (!session.user.isAdmin) {
      gate('Admin access only', `Signed in as ${session.user.handle}, but this account is not an admin. Set profiles.is_admin = true in Supabase to grant access.`,
           [{href: 'profile.html', label: 'Back to profile', cls: 'btn-ghost'}]);
      return;
    }
    document.getElementById('gate').classList.add('hide');
    await reload();
  }

  async function reload() {
    allRegs = await TArenaAuth.getRegistrations();
    renderStats();
    renderRegs();
    renderUniBar();
  }

  function renderStats() {
    const students = allRegs.filter(r => r.type === 'student').length;
    const pub      = allRegs.filter(r => r.type !== 'student').length;
    const weekAgo  = Date.now() - 7 * 86400000;
    const recent   = allRegs.filter(r => r.joinedAt > weekAgo).length;
    document.getElementById('statTotal').textContent    = allRegs.length.toLocaleString();
    document.getElementById('statStudents').textContent = students.toLocaleString();
    document.getElementById('statPublic').textContent   = pub.toLocaleString();
    document.getElementById('statRecent').textContent   = '+' + recent.toLocaleString();
  }

  function renderRegs() {
    const regs = allRegs
      .slice()
      .filter(r => !searchTerm
        || (r.email      || '').toLowerCase().includes(searchTerm)
        || (r.username   || '').toLowerCase().includes(searchTerm)
        || (r.university || '').toLowerCase().includes(searchTerm));
    const body = document.getElementById('regBody');
    if (!regs.length) {
      body.innerHTML = `<tr><td colspan="5"><div class="empty"><i class="fa-solid fa-user-plus"></i><div>No registrations yet.</div><div style="margin-top:8px;font-size:13px;">Send the link to your first testers — sign-ups will appear here in real time.</div></div></td></tr>`;
      return;
    }
    body.innerHTML = regs.map(r => `<tr>
      <td><strong>${r.email}</strong></td>
      <td>@${r.username}</td>
      <td>${r.university}</td>
      <td>${r.type === 'student' ? '<span class="badge-gold badge">Student</span>' : '<span class="badge-blue badge">Public</span>'}${r.isAdmin ? ' <span class="badge badge-blue" style="background:rgba(96,165,250,.15);color:#93c5fd;">admin</span>' : ''}</td>
      <td class="text-right text-muted" style="font-size:12.5px;">${new Date(r.joinedAt).toLocaleString('en-AU')}</td>
    </tr>`).join('');
  }

  function renderUniBar() {
    const counts = {};
    allRegs.forEach(r => { counts[r.university || 'Public'] = (counts[r.university || 'Public'] || 0) + 1; });
    const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 10);
    const max = sorted[0] ? sorted[0][1] : 1;
    const bar = document.getElementById('uniBar');
    if (!sorted.length) {
      bar.innerHTML = '<div class="empty"><i class="fa-solid fa-graduation-cap"></i><div>No universities yet.</div></div>';
      return;
    }
    bar.innerHTML = sorted.map(([uni, n]) => `
      <div class="uni-row">
        <div class="name">${uni}</div>
        <div class="bar"><div style="width:${(n/max)*100}%"></div></div>
        <div class="count">${n}</div>
      </div>`).join('');
  }

  function exportRegs() {
    if (!allRegs.length) { alert('Nothing to export.'); return; }
    const rows = [['Email','Username','University','Type','Admin','Joined']];
    allRegs.forEach(r => rows.push([r.email, r.username, r.university, r.type, r.isAdmin ? 'yes' : '', new Date(r.joinedAt).toISOString()]));
    const csv = rows.map(r => r.map(c => `"${String(c == null ? '' : c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'tradearena-registrations-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  }
  window.exportRegs = exportRegs;
  window.reload = reload;

  init();
  console.log('%c⚔️ TradeArena · Admin loaded.', 'color:#e8c060;font-weight:700;');
</script>
</body>
</html>
