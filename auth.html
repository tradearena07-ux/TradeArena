<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeArena • Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .dashboard-bg { background: linear-gradient(180deg, #0f172a 0%, #020617 100%); }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="dashboard-bg text-white min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full mx-4">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-emerald-500 rounded-3xl flex items-center justify-center text-4xl font-bold shadow-lg">₿</div>
                <h1 class="text-5xl font-bold tracking-tighter">TradeArena</h1>
            </div>
        </div>

        <div class="glass border border-slate-700 rounded-3xl p-8 shadow-2xl">
            <!-- Tabs -->
            <div class="flex bg-slate-900 rounded-3xl p-1 mb-8 text-sm font-medium">
                <button onclick="switchTab(0)" id="tab-login" class="flex-1 py-4 rounded-3xl transition-all active">Sign In</button>
                <button onclick="switchTab(1)" id="tab-signup" class="flex-1 py-4 rounded-3xl transition-all">Sign Up</button>
            </div>

            <!-- SIGN IN FORM -->
            <div id="login-form">
                <div class="space-y-6">
                    <div>
                        <label class="text-xs text-slate-400 block mb-2">Email</label>
                        <input id="login-email" type="email" placeholder="you@tradearena.com.au" 
                               class="w-full bg-slate-800 border border-slate-700 focus:border-emerald-500 rounded-3xl px-6 py-5 outline-none text-lg">
                    </div>

                    <!-- Password mode -->
                    <div id="password-section">
                        <label class="text-xs text-slate-400 block mb-2">Password</label>
                        <input id="login-password" type="password" placeholder="••••••••" 
                               class="w-full bg-slate-800 border border-slate-700 focus:border-emerald-500 rounded-3xl px-6 py-5 outline-none text-lg">
                        <div onclick="forgotPassword()" class="text-emerald-400 text-sm text-right mt-2 cursor-pointer hover:underline">Forgot password?</div>
                    </div>

                    <!-- OTP mode toggle -->
                    <div onclick="toggleOtpMode()" id="otp-toggle" class="text-emerald-400 text-sm flex items-center justify-center gap-2 cursor-pointer">
                        <i class="fa-solid fa-key"></i> Login with 6-digit OTP instead
                    </div>

                    <button onclick="handleLogin()" id="login-btn"
                            class="w-full py-6 bg-emerald-500 hover:bg-emerald-400 text-black font-bold text-xl rounded-3xl transition">
                        Sign In Securely
                    </button>
                </div>
            </div>

            <!-- SIGN UP FORM -->
            <div id="signup-form" class="hidden">
                <div class="space-y-6">
                    <div>
                        <label class="text-xs text-slate-400 block mb-2">Email</label>
                        <input id="signup-email" type="email" placeholder="you@tradearena.com.au" 
                               class="w-full bg-slate-800 border border-slate-700 focus:border-emerald-500 rounded-3xl px-6 py-5 outline-none text-lg">
                    </div>

                    <div id="signup-otp-section">
                        <button onclick="sendOtp()" id="send-otp-btn"
                                class="w-full py-6 bg-emerald-500 hover:bg-emerald-400 text-black font-bold text-xl rounded-3xl transition">
                            Send 6-digit OTP
                        </button>
                    </div>

                    <!-- OTP input (hidden until sent) -->
                    <div id="otp-input-section" class="hidden space-y-4">
                        <label class="text-xs text-slate-400 block mb-2">Enter 6-digit code</label>
                        <input id="otp-code" type="text" maxlength="6" placeholder="123456" 
                               class="w-full bg-slate-800 border border-slate-700 focus:border-emerald-500 rounded-3xl px-6 py-5 outline-none text-4xl text-center font-mono tracking-widest">
                        <button onclick="verifyOtp()" class="w-full py-6 bg-emerald-500 hover:bg-emerald-400 text-black font-bold text-xl rounded-3xl transition">
                            Verify & Create Account
                        </button>
                        <div id="resend-text" onclick="resendOtp()" class="text-center text-emerald-400 text-sm cursor-pointer">Resend code (30s)</div>
                    </div>

                    <div class="text-center text-slate-400 text-sm">or</div>
                    <button onclick="switchToPasswordSignup()" class="w-full py-6 border border-slate-700 hover:bg-slate-800 rounded-3xl font-medium">
                        Sign up with email + password
                    </button>
                </div>
            </div>

            <p id="message" class="text-center mt-6 text-sm min-h-[24px]"></p>
        </div>

        <p class="text-center text-slate-400 text-xs mt-8">© TradeArena 2026 • ASX • Crypto • Zero fees on first 100 trades</p>
    </div>

    <script>
        // === REPLACE THESE WITH YOUR REAL SUPABASE KEYS ===
        const SUPABASE_URL = 'https://YOUR-PROJECT-ID.supabase.co'
        const SUPABASE_ANON_KEY = 'eyJ...your-anon-key-here...'
        
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

        let currentEmail = ''
        let otpTimer = null

        function switchTab(n) {
            document.getElementById('login-form').classList.toggle('hidden', n === 1)
            document.getElementById('signup-form').classList.toggle('hidden', n === 0)
            document.getElementById('tab-login').classList.toggle('active', n === 0)
            document.getElementById('tab-signup').classList.toggle('active', n === 1)
        }

        async function sendOtp() {
            const email = document.getElementById('signup-email').value.trim().toLowerCase()
            if (!email) return showMessage('Enter your email', 'red')
            
            currentEmail = email
            document.getElementById('send-otp-btn').innerHTML = 'Sending 6-digit code...'
            
            const { error } = await supabase.auth.signInWithOtp({ email })
            
            if (error) return showMessage(error.message, 'red')
            
            showMessage('✅ 6-digit OTP sent to your email!', 'emerald')
            document.getElementById('signup-otp-section').classList.add('hidden')
            document.getElementById('otp-input-section').classList.remove('hidden')
            
            startResendTimer()
        }

        function startResendTimer() {
            let time = 30
            const btn = document.getElementById('resend-text')
            btn.style.pointerEvents = 'none'
            otpTimer = setInterval(() => {
                time--
                btn.textContent = `Resend code (${time}s)`
                if (time <= 0) {
                    clearInterval(otpTimer)
                    btn.textContent = 'Resend code'
                    btn.style.pointerEvents = 'auto'
                }
            }, 1000)
        }

        async function verifyOtp() {
            const code = document.getElementById('otp-code').value.trim()
            if (code.length !== 6) return showMessage('Enter 6 digits', 'red')
            
            const { data, error } = await supabase.auth.verifyOtp({
                email: currentEmail,
                token: code,
                type: 'email'          // ← THIS IS THE FIX (was 'signup' before)
            })
            
            if (error) return showMessage(error.message, 'red')
            
            showMessage('🎉 Account created! Welcome to TradeArena.', 'emerald')
            setTimeout(() => window.location.href = 'trade.html', 1200)
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim().toLowerCase()
            const passwordField = document.getElementById('login-password')
            const isOtpMode = passwordField.style.display === 'none'
            
            if (!email) return showMessage('Enter email', 'red')
            
            const btn = document.getElementById('login-btn')
            btn.innerHTML = 'Signing in...'
            
            if (isOtpMode) {
                // OTP login
                const { error } = await supabase.auth.signInWithOtp({ email })
                if (error) return showMessage(error.message, 'red')
                showMessage('6-digit OTP sent! Check your email.', 'emerald')
                // You can add a second step here if you want full OTP input on login too
            } else {
                // Password login
                const password = passwordField.value
                if (!password) return showMessage('Enter password', 'red')
                
                const { error } = await supabase.auth.signInWithPassword({ email, password })
                if (error) return showMessage(error.message, 'red')
                
                showMessage('Welcome back!', 'emerald')
                setTimeout(() => window.location.href = 'trade.html', 800)
            }
        }

        function toggleOtpMode() {
            const pwSection = document.getElementById('password-section')
            pwSection.style.display = pwSection.style.display === 'none' ? 'block' : 'none'
            document.getElementById('otp-toggle').innerHTML = pwSection.style.display === 'none' 
                ? '<i class="fa-solid fa-lock"></i> Login with password instead' 
                : '<i class="fa-solid fa-key"></i> Login with 6-digit OTP instead'
        }

        async function switchToPasswordSignup() {
            const email = document.getElementById('signup-email').value.trim().toLowerCase()
            if (!email) return showMessage('Enter email first', 'red')
            
            const password = prompt('Create a strong password for future logins:')
            if (!password || password.length < 8) return showMessage('Password too weak', 'red')
            
            const { error } = await supabase.auth.signUp({ email, password })
            if (error) return showMessage(error.message, 'red')
            
            showMessage('Account created with password! You can now login with it.', 'emerald')
            setTimeout(() => switchTab(0), 1500)
        }

        async function forgotPassword() {
            const email = document.getElementById('login-email').value.trim().toLowerCase()
            if (!email) return showMessage('Enter your email first', 'red')
            
            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/auth.html'
            })
            if (error) return showMessage(error.message, 'red')
            showMessage('Password reset link sent!', 'emerald')
        }

        function resendOtp() {
            sendOtp()
        }

        function showMessage(text, color) {
            const msg = document.getElementById('message')
            msg.innerHTML = `<span class="text-${color}-400">${text}</span>`
            setTimeout(() => msg.innerHTML = '', 5000)
        }

        // Auto-check if already logged in
        window.onload = async () => {
            const { data: { session } } = await supabase.auth.getSession()
            if (session) window.location.href = 'trade.html'
        }
    </script>
</body>
</html>
